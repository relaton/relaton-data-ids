abstract:
- content: "<p>This document defines five actor-chain profiles for OAuth 2.0 Token
    Exchange {{!RFC8693}}. {{!RFC8693}} permits nested act claims, but prior actors
    remain informational only and token exchange does not define how a delegation
    path is preserved and validated across successive exchanges. This document defines
    profile-specific processing for linear multi- hop workflows. The five profiles
    are: Asserted Chain with Full Disclosure; Asserted Chain with Subset Disclosure;
    Committed Chain with Full Disclosure; Committed Chain with Subset Disclosure;
    and Committed Chain with No Chain Disclosure. These profiles preserve the existing
    meanings of sub and act, support same-domain and cross-domain delegation, require
    sender-constrained tokens, and provide different tradeoffs among readable chain-based
    authorization, cryptographic accountability, auditability, privacy, and long-running
    workflow support.</p>"
