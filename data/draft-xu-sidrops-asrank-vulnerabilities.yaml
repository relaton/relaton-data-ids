abstract:
- content: "<p>This document analyzes the structural vulnerabilities of ASRank, a
    widely used algorithm for inferring Autonomous System (AS) business relationships
    from BGP routing data. ASRank plays a key role in security research and BGP operation,
    yet its inference process is highly sensitive to small changes in input data.
    This sensitivity introduces risks in adversarial conditions, where inference results
    may be manipulated without detection. This document outlines the design of ASRank,
    identifies its structural vulnerabilities, analyzes a minimal manipulation example,
    and discusses the security implications and potential countermeasures.</p>"
