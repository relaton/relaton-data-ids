abstract:
- content: "<p>This document clarifies and extends the meaning of Composite Attester
    from RFC9334. A system of annotated diagram components is defined as a small language
    to explain the different ways that components can interact to form composites.
    These diagram components are then used to define a few popular classes of composites.</p>"
