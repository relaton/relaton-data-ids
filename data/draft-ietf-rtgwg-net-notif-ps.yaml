abstract:
- content: "<p>Many network applications, ranging from Artificial Intelligence (AI)
    /Machine Learning (ML) training or inference to cloud services, require high bandwidth,
    low delay, low jitter and minimal packet loss in data transfer, which requires
    that the networks can be adaptive in the presence of faults, degradations, or
    congestion. However, existing traffic management mechanisms often face limitations
    in responsiveness, coverage, and operational complexity, particularly in high-speed
    and large-scale network environments. A good and timely understanding of network
    operational status can help to enable faster response to critical events, so as
    to enable the selection of paths with reduced latency and improve network utilization.
    This document describes the existing problems and the need for fast network notification
    solutions.</p>"
