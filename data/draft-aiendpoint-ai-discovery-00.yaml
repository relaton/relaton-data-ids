abstract:
- content: <p>This document defines a lightweight mechanism by which web services
    expose a machine-readable description of their capabilities to autonomous AI agents.
    The mechanism consists of a well-known resource, served at "/.well-known/ai",
    that returns a structured JSON document describing the service's identity, available
    actions, authentication requirements, and operational hints optimized for large
    language model (LLM) token efficiency. The specification addresses the absence
    of a standardized method for AI agents to programmatically discover what a web
    service can do and how to invoke its capabilities, without resorting to parsing
    human- oriented documentation or HTML content.</p>
