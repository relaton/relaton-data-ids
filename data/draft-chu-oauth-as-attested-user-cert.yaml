abstract:
- content: "<p>This document defines an extension to the OAuth 2.0 Rich Authorization
    Requests (RAR) framework. It introduces a mechanism that allows a Client, such
    as an autonomous AI Agent, to request an Authorization Server (AS) to include
    an AS-attested Resource Owner public key certificate within, or bound to, an Access
    Token. This mechanism enables the Resource Server (RS) to securely obtain the
    Resource Owner's trusted public key, which can then be used to verify application-layer
    delegation evidence (e.g., Verifiable Credentials) signed by the Resource Owner.</p>"
