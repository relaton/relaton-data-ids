abstract:
- content: "<p>This document defines functional, protocol, and operational requirements
    for Provider Edge (PE) devices operating in a multi- domain network environment
    where the underlay is exclusively based on IPv6. These requirements ensure consistent
    service delivery, interoperability, and efficient operations across autonomous
    domains while supporting IPv4-as-a-Service (IPv4aaS).</p>"
