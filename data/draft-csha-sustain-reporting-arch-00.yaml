abstract:
- content: "<p>This document provides an architectural mapping between the Exigence
    intra-domain functional architecture and the IETF GREEN Framework for Energy Efficiency
    Management. The purpose is to harmonize Exigence’s service-centric energy attribution
    and green orchestration functions with the multi-layered monitoring, control and
    API-exposed energy management architecture defined in the GREEN reference model.
    This document identifies a number of functional components enabling a service-centric
    energy attribution for the network domain, and describes their mapping to the
    IETF GREEN framework for energy efficiency management, including interfaces and
    energy-object concepts. Such functional components allow the realization of green
    orchestration capabilities with multi-layered monitoring, control and API-exposed
    energy management.</p>"
