abstract:
- content: "<p>This document defines the intent_chain claim as a companion to the
    actor_chain claim defined in {{!I-D.draft-mw-spice-actor-chain}}. While the actor
    chain addresses delegation provenance (WHO delegated to whom), the intent chain
    addresses content provenance (WHAT was produced and HOW it was transformed). In
    AI agent workflows, content flows through multiple processing stages including
    AI agents and filters. The intent chain provides a cryptographically verifiable,
    tamper-evident record of this content journey. The full intent chain is stored
    as ordered logs, with only the Merkle root included in the OAuth token for efficiency.
    Together, the actor chain and intent chain provide complete governance for autonomous
    AI agent systems, addressing Spoofing, Tampering, Repudiation, and Elevation of
    Privilege threats in the STRIDE threat model.</p>"
