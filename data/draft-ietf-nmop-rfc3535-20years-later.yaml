abstract:
- content: <p>This document identifies a list of operators requirements for network
    management operations. These requirements reflect advances in this field since
    the publication of "IAB Network Management Workshop" (RFC 3535), which was instrumental
    for developing many key technologies that are widely deployed. Discussion Venues
    This note is to be removed before publishing as an RFC. Source for this draft
    and an issue tracker can be found at https://github.com/boucadair/rfc3535-20years-later.</p>
