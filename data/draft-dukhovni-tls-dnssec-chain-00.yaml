abstract:
- language: en
  script: Latn
  content: "   This draft describes a new TLS extension for transport of a DNS\n   record
    set serialized with the DNSSEC signatures needed to\n   authenticate that record
    set.  This allows TLS clients to perform\n   DANE authentication of a TLS server
    without the need to perform\n   additional DNS record lookups.\n\n\t "
