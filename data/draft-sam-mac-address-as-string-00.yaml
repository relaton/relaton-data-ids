abstract:
- content: "<p>IETF and IEEE 802.1 have different patterns for mac addresses in their
    respective YANG types modules. Therefore equivalent mac addresses may or may not
    match if a mac-address that uses the IETF datatype is compared to a mac-address
    that uses the IEEE datatype (and vise-versa). Discussion Venues This note is to
    be removed before publishing as an RFC. Source for this draft and an issue tracker
    can be found at https://github.com/samans/draft-sam-mac-address-as-string.</p>"
