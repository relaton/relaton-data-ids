abstract:
- content: "<p>This document defines the AAuth authorization protocol, in which agents
    obtain proof-of-possession tokens from auth servers to access resources on behalf
    of users and organizations. It specifies three token types (agent, resource, and
    auth), a unified token endpoint with deferred response support, and cross-domain
    federation between auth servers. It builds on the AAuth Headers specification
    ([I-D.hardt-aauth-headers]), which defines the AAuth-Requirement response header
    and HTTP Message Signatures profile.</p>"
