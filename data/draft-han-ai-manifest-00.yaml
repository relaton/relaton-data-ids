abstract:
- content: "<p>This document specifies the AI Manifest protocol, a JSON-based format
    for websites to declare step-by-step user interface (UI) workflow instructions
    readable by autonomous AI agents. By embedding the manifest, website operators
    allow AI agents using browser-automation tools to execute multi-step transactions
    directly via Cascading Style Sheets (CSS) selectors, without repeated analysis
    of the full Document Object Model (DOM). The specification defines three interoperable
    embedding methods, a SHA-256 canonical hash verification procedure via a central
    trust registry, and security mitigations against prompt injection attacks. Empirical
    results from a reference implementation demonstrate an 81.9% reduction in input
    tokens consumed by the AI agent and an increase in task success rate from 20%
    to 100% on a representative multi-step transaction, compared with conventional
    DOM-analysis approaches.</p>"
