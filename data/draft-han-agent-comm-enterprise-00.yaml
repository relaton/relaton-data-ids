abstract:
- content: "<p>This document focuses on enterprise scenarios, investigating key technologies
    including agent identification and registration, capability discovery, efficient
    communication, and secure collaboration. It proposes an agent identifier and semantic
    routing mechanism to achieve trusted access and efficient collaboration among
    heterogeneous agents, providing a technical path for campus-level multi-agent
    cooperation.</p>"
