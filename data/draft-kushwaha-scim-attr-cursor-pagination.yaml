abstract:
- content: "<p>The System for Cross-domain Identity Management (SCIM) 2.0 specification
    (RFC 7644) defines pagination mechanisms at the resource level. However, it does
    not provide a standardized method for paginating large multi-valued attributes
    within a resource. This limitation creates scalability and performance challenges
    in modern identity systems, particularly for attributes such as group memberships,
    roles, and entitlements. This document proposes a cursor-based pagination mechanism
    for multi-valued attributes in SCIM resources. The proposal introduces attribute-level
    pagination parameters and response metadata, including total count, to improve
    performance, consistency, and usability in large-scale deployments.</p>"
