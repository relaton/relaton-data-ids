abstract:
- content: "<p>This document specifies the Agent Route Origin Authorization (AgentROA)
    framework, a cryptographic policy enforcement model for governing the actions
    of autonomous AI agents operating over the Model Context Protocol (MCP) and Agent-to-Agent
    (A2A) protocols. AgentROA introduces three core protocol objects: the Agent Route
    Origin Authorization (ROA) envelope, the Agent Route Attestation (ARA) per-hop
    receipt, and the Agent Execution Receipt (AER). Together these objects enable:
    (1) cryptographic binding of an agent's authorized action scope to a signed policy
    envelope at session initialization, (2) per-hop attestation across multi-agent
    delegation chains with monotonic scope-narrowing semantics (no policy envelope
    may be expanded by a downstream delegation), and (3) cryptographic receipts produced
    intrinsically by the enforcement decision at each MCP tool call boundary. The
    framework is modeled on the BGP Route Origin Authorization (ROA) concept from
    RPKI (RFC 6480) applied to the AI agent execution domain. The Border Gateway enforcement
    model positions a cryptographic enforcement proxy at the MCP protocol boundary
    — external to the agent's execution context — reducing the risk that governance
    decisions are influenced by the governed agent by placing enforcement in a separate
    process boundary. This document establishes the architectural model, protocol
    object schemas, and enforcement semantics for the AgentROA framework.</p>"
