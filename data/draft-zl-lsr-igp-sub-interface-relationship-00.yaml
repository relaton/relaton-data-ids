abstract:
- content: "<p>This document extends ISIS and OSPF, allowing a network device to advertise
    the relationship between a physical interface and its sub- interfaces. This extension
    enables the links based on sub-interfaces to participate in the alternative paths
    for load balancing in SRv6 BE bandwidth polling.</p>"
