- id: draft-iurman-6man-eh-occurrences
  type: Internet-Draft
  primary: true
abstract:
- content: "<p>Operational experience has demonstrated that permitting multiple occurrences
    of the same IPv6 Extension Header can create parsing ambiguity, complicate packet
    processing, and increase potential security risks. Although RFC 8200 recommends
    that senders follow a specific order of appearance and limit the occurrences of
    Extension Headers, receivers cannot assume that these recommendations have been
    followed. This document specifies behavior that allows an IPv6 destination node,
    namely a host (i.e., the final destination of an IPv6 packet) or an intermediate
    destination node addressed by an entry in a Routing header list other than the
    final one, to enforce strict ordering and limits on the occurrence of Extension
    Headers.</p>"
