abstract:
- content: "<p>This document defines the OMP domain profile for digital credit providers
    (DCPs) operating under the Central Bank of Kenya Digital Credit Providers Regulations
    2022 (CBK NDTCP). It specifies the Intent Class configuration, routing threshold
    ranges, Watchtower definitions, and Audit Trace extensions required to satisfy
    per- decision explainability and human oversight evidence requirements for AI-assisted
    credit decisions under the CBK framework. The Central Bank of Kenya AI Banking
    Sector Survey (July 2025) found that few institutions using AI for credit decisions
    have mechanisms for per-decision explainability. The CBK AI Guidance Note, in
    preparation as of March 2026, will define what adequate AI governance evidence
    means for all 195 licensed DCPs. This profile specifies the technical architecture
    that satisfies those requirements. This profile REQUIRES implementation of the
    core OMP protocol as defined in draft-veridom-omp. All terms and base protocol
    specifications in that document apply to this profile. This document specifies
    only the domain parameters.</p>"
