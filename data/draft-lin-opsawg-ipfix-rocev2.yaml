abstract:
- content: "<p>This document defines a new set of IP Flow Information Export (IPFIX)
    Information Elements (IEs) for exporting Base Transport Header (BTH) information
    for RDMA over Converged Ethernet version 2 (RoCEv2) traffic. These extensions
    enable network monitoring systems to collect and analyze the characteristics of
    RDMA traffic widely used in high-performance computing, storage, and artificial
    intelligence applications.</p>"
