abstract:
- content: "<p>This document defines the Attested Inference Receipt (AIR), a COSE_Sign1
    envelope carrying CWT claims profiled per the Entity Attestation Token (EAT) framework.
    An AIR receipt binds model identity, input/output hashes, platform attestation
    metadata, and operational telemetry into a single signed artifact suitable for
    audit, compliance, and third-party verification of a confidential AI inference
    event. AIR v1 targets single-inference receipts emitted by workloads running inside
    hardware-isolated Trusted Execution Environments (TEEs). It supports AWS Nitro
    Enclaves and Intel TDX measurement formats, with extension points for additional
    platforms. Pipeline chaining and multi-inference receipts are out of scope for
    this version.</p>"
