abstract:
- content: "<p>This document provides a detailed explanatory rendering of the Universal
    AI Ethics and Moral Framework, abbreviated UAEMF. The framework is presented as
    a universal moral architecture for the governance of artificial intelligence systems.
    It is designed not merely as a short ethics statement, but as a structured document
    that moves from first principles to practical obligations. The explanatory goal
    of this draft is to describe what the framework is, what problem it is trying
    to solve, how its axioms function, how its twelve principles are meant to operate,
    why its tiered governance structure matters, and how its permanence and provenance
    mechanisms support integrity and historical traceability. The source framework
    is archived through Zenodo under DOI 10.5281/zenodo.19010455 and is represented
    as cryptographically timestamped through OpenTimestamps in Bitcoin block 940570,
    with the attestation date shown as 2026-03-13 EST.</p>"
