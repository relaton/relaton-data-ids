abstract:
- content: <p>This document defines an extension to OAuth 2.0 Token Exchange [[RFC8693]]
    that addresses the problem of *Delegation Auditability Gaps* in multi-hop service
    environments. Current standards treat prior actors in a delegation chain as "informational
    only," providing no cryptographic proof of the actual delegation path. This document
    proposes a new actor_chain claim — a *Cryptographically Verifiable Actor Chain*
    — that replaces the informational-only nested act claim with a tamper-evident,
    ordered record of all actors. This solution enables high-assurance data-plane
    policy enforcement and forensic auditability, particularly for dynamic AI agent-to-agent
    workloads—where susceptibility to *prompt injection attacks* can lead to unauthorized
    delegation paths — the security posture of the entire delegation chain is critical
    for authorization decisions.</p>
