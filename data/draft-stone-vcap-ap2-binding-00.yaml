abstract:
- content: '<p>This document specifies how the Verified Commerce for Agent Protocols
    (VCAP) settlement layer binds to the Agent Payments Protocol (AP2) developed by
    Google and its coalition partners. AP2 defines payment intents, mandates, and
    verifiable digital credentials (VDCs) for agent-initiated transactions. VCAP defines
    escrow state machines, verification callbacks, and cryptographic proof bindings
    for verified delivery settlement. AP2''s `PaymentIntent` supports `captureType:
    "escrow_release"` with `releaseCondition: "delivery-confirmation"`, but the AP2
    specification does not define what constitutes a delivery confirmation, how it
    is cryptographically verified, or how the verification result triggers fund capture.
    This binding document fills that gap.</p>'
