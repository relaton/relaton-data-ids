abstract:
- content: "<p>This document specifies the AI Discovery and Retrieval Endpoint (AIDRE),
    a protocol for publishing machine-oriented, canonical, and semantically retrievable
    content on the web. AIDRE defines a discovery document, collection metadata, retrieval
    interfaces, optional vector-native query support, and content representation rules
    for AI systems. AIDRE aims to reduce redundant crawling, parsing, tokenization,
    and embedding of the same origin content while improving freshness, provenance,
    and interoperability for AI systems.</p>"
