abstract:
- content: <p>Some DNS operators want to test what will happen when DNSSEC algorithms
    that have large DNSKEY records, RRSIG records, or both, are deployed. For example,
    they may want to see the effects on TCP retries due to large DNSSEC records. This
    document defines a new DNS security algorithm, named "Variable Length Nonparticipating",
    for such testing. To prevent possible security issues with this new algorithm,
    signatures with this algorithm never participate in DNSSEC validation. This document
    might never become an RFC; it's purpose is just to register the new algorithm
    in the IANA "DNS Security Algorithm Numbers" registry.</p>
