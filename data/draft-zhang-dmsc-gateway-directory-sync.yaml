abstract:
- content: "<p>This document describes a capability-directory framework for the Internet
    of Agents (IoA) in deployments that use Agent Gateways. It defines requirements
    and a common object model for gateway-managed capability information, including
    the Agent Capability Specification (ACS), Capability Digest, and directory entry
    lifecycle. It also specifies synchronization, freshness, provenance, and validation
    requirements for capability information exchanged across gateways. This document
    clarifies the relationship between gateway-managed ACS objects and externally
    published descriptions such as the A2A Agent Card. It does not define a discovery
    query protocol, ranking algorithm, task orchestration protocol, or agent-to-agent
    session protocol. It can be used as input to future DMSC protocol work, including
    capability digest synchronization and related gateway procedures.</p>"
