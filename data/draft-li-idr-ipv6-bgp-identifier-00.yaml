abstract:
- content: "<p>This document defines a new BGP Capability that enables an IPv6 BGP
    Speaker to use its global unicast IPv6 address as its BGP Identifier. This mechanism
    simplifies configuration in IPv6-only networks by leveraging the inherent uniqueness
    of IPv6 addresses, while maintaining full backward compatibility with existing
    BGP implementations.</p>"
