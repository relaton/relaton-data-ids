abstract:
- content: "<p>Many per-packet load balancing schemes have been proposed to mitigate
    network load imbalances. However, due to the randomness of packet paths, loss
    location is challenging in per-packet load balancing networks. An efficient solution
    is to leverage the alternate packet marking technique. This draft analyzes the
    usage and requirements of alternate packet marking for packet loss detection and
    location in per-packet load balancing networks.</p>"
