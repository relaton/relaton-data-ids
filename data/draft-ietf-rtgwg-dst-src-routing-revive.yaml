abstract:
- content: "<p>This document specifies using packets' source addresses in route lookups
    as additional qualifier to be used in hop-by-hop routing decisions. The proposed
    mechanism applies to IPv6 [RFC8200] in general with specific considerations for
    routing protocols.</p>"
