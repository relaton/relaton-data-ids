abstract:
- content: "<p>The objective of the collaboration between 3GPP and IETF is securing
    timely development of technical specifications, and to facilitate maximum interoperability
    with existing fixed and mobile Internet systems, devices, and protocols. This
    document summarizes some high- level principles of cooperation and the coordination
    between both organizations while leaving out the detailed descriptions to be specified
    and maintained by the coordination function itself.</p>"
