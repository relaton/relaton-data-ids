abstract:
- content: "<p>This document specifies a verifiable telemetry ledger profile for accepted
    telemetry in resource-constrained sensing environments. The profile begins after
    local policy has admitted a pod and the gateway accepts its framed telemetry under
    the active transport and anti- replay contract. From that point onward, it defines
    deterministic frame-to-canonical-record projection, authoritative canonical-record
    and day artifacts, verifier-facing manifests, disclosure classes, and the binding
    of day artifacts to external timestamp evidence. OpenTimestamps (OTS) is the default
    anchoring channel; RFC 3161 timestamp responses and peer signatures are optional
    parallel channels. The goal is interoperability and independent auditability,
    not a full device-lifecycle system or new cryptographic primitives. Verification
    claims are limited by the disclosed artifacts, the claimed disclosure class, and
    the checks the verifier actually executes. A successful result establishes internal
    consistency and correct proof binding for the disclosed bundle; it does not by
    itself establish dataset completeness, physical truth of measurements, or safety
    for autonomous actuation.</p>"
