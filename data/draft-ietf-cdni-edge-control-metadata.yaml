abstract:
- content: "<p>This specification defines configuration metadata objects used to manage
    how edge servers control access to resources within Content Delivery Networks
    (CDNs) and Open Caching systems. A key feature of these configurations is the
    configuring of Cross-Origin Resource Sharing (CORS) access rules and the dynamic
    generation of CORS headers. This specification also provides the ability to define
    response body compression rules and client connection timeouts.</p>"
