abstract:
- content: <p>This document discusses a deployment scenario called "an IPv6-mostly
    network", when IPv6-only and IPv4-enabled endpoints coexist on the same network
    (network segment, VLAN, SSID etc). The proposed approach enables smooth and incremental
    transition from dual-stack to IPv6-only network by allowing IPv6-capable devices
    to remain IPv6-only while the network is seamlessly supplying IPv4 to those that
    require it.</p>
