abstract:
- content: "<p>This document specifies the Agent Context Compression Protocol (ACCP),
    a semantic encoding and context management protocol for communication between
    AI agents within agentic harnesses. ACCP defines a compact message format, intent
    ontology, state compression strategy, and codec interface that collectively reduce
    token consumption by 60-90% compared to natural language or standard JSON messaging.
    ACCP is designed to complement existing protocols (MCP, A2A) and is transport-agnostic.</p>"
