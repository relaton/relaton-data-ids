abstract:
- content: "<p>Complex inter-party communication or relationship dynamics can be implied
    within the use of more structured protocols. This document proposes a compact
    binary representation for describing these dynamics in a non-protocol-binding
    manner that can be readily converted back to a readable format and provide additional
    context for implementers.</p>"
