abstract:
- content: "<p>Multicast has the potential to be applied in Artificial Intelligence
    Data Centers (AIDCs) to improve the efficiency of point-to-multipoint data transmission
    during large language model training and inference. This document identifies key
    requirements of multicast in AIDCs, and analyzes the gaps between these requirements
    and the capabilities of existing multicast technologies.</p>"
