abstract:
- content: "<p>This document specifies a verifiable telemetry ledger profile for resource-constrained
    sensing environments. The profile defines how a gateway accepts framed telemetry,
    applies anti-replay policy, projects accepted frames into canonical facts, builds
    deterministic daily Merkle commitments, and anchors daily artifacts with external
    timestamp proofs. OpenTimestamps (OTS) is the default anchoring mechanism; optional
    parallel attestation methods (RFC 3161 timestamp protocol and peer signatures)
    are also described. The goal is interoperability and independent auditability,
    not new cryptographic primitives.</p>"
