abstract:
- content: "<p>This document describes a mechanism for protecting selected service
    traffic using IPsec ESP while transporting the traffic over an SRv6 Policy. The
    approach enables service payloads to be encrypted prior to SRv6 encapsulation,
    allowing the SRv6 header to remain visible for segment-based forwarding within
    the provider network. This mechanism supports services or applications that require
    additional confidentiality and integrity protection, even when carried over an
    operator-managed SRv6 domain. The document also outlines how the necessary parameters
    can be signaled using BGP.</p>"
