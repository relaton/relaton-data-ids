abstract:
- content: "<p>This document describes a repeatable publication model for cryptographic
    work in the IETF. It separates cryptographic mechanism specifications requiring
    deep security justification from protocol- oriented specifications defining interoperability,
    wire formats, and registries. It describes a dedicated working group model for
    coordinating Standards Track deployment of CFRG mechanisms and recommends use
    of the CFRG Crypto Review Panel to help working groups strengthen their Security
    Considerations text.</p>"
