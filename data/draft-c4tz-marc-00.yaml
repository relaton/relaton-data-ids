abstract:
- content: "<p>This document specifies MARC, a vendor-neutral control and uncertainty-disclosure
    profile for generative models and agentic systems. MARC defines a small set of
    interoperable control signals, separates pre-decision capability assessment from
    post-decision answer confidence, and describes a bounded action set for answering,
    clarification, retrieval, tool use, abstention, and escalation. MARC does not
    standardize model internals, training methods, or claims about machine cognition.
    Instead, it defines externally observable semantics that can be implemented by
    model providers, orchestration layers, evaluation harnesses, and user-facing systems.
    The goal is to reduce silent failure, unnecessary externalization, and misleading
    uncertainty communication while improving auditability and interoperability.</p>"
