abstract:
- content: "<p>This document defines a domain profile of the Operating Model Protocol
    (OMP) for legal AI deployments subject to attorney supervision obligations under
    ABA Model Rule 5.3 Responsibilities Regarding Nonlawyer Assistance and California
    Senate Bill 574 (SB 574, effective January 1, 2026). These instruments impose
    principal accountability requirements on attorneys who use AI tools to assist
    with legal work product -- requiring attorneys to verify AI-generated material,
    ensure compliance with professional duties, and maintain evidence of supervision.
    This profile specifies how OMP's deterministic routing invariant, Watchtower enforcement
    framework, and three-layer cryptographic integrity architecture satisfy the attorney
    supervision obligations imposed by Rule 5.3 and SB 574, and defines the domain-specific
    Watchtower configurations, Named Accountable Officer assignments, and Audit Trace
    schema extensions applicable to legal AI deployments. The profile is designated
    the CiteGuard profile. The OMP core specification is defined in a separate Internet-Draft.</p>"
