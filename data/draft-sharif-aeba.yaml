abstract:
- content: "<p>This document specifies Agent Event Behaviour Analysis (AEBA), a framework
    for collecting, signing, exchanging, and analysing behavioural events produced
    by autonomous AI agents. AEBA is the agent-domain equivalent of User and Entity
    Behaviour Analytics (UEBA) as commonly deployed in enterprise Security Operations
    Centres. It defines a canonical event schema, signature binding to agent identity,
    baseline and peer-group exchange protocols, deviation signalling, detection rule
    structure, revocation mechanisms, and interoperability bindings for existing Security
    Information and Event Management (SIEM) event formats (syslog, CEF, LEEF). The
    framework is designed to compose with existing cryptographic primitives for agent
    identity, payment, and transport security, and to support cross-framework deployments
    in which agents produced by different runtimes must share a common behavioural
    observability surface.</p>"
