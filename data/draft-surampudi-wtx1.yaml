abstract:
- content: "<p>This document defines the WTX-1 (WaiTag Transfer Protocol, version
    1) for preserving pseudonymous user context across unrelated web domains without
    third-party cookies, browser fingerprinting, login requirements, or personal data
    collection. The protocol uses cryptographically generated pseudonymous identifiers
    (WaiTags), URL hash fragment transport, server-side verification, and DNS-based
    domain authorization to enable privacy-respecting cross-domain analytics.</p>"
