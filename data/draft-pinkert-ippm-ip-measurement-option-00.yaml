abstract:
- content: "<p>This document introduces an internet protocol (IP) measurement option
    (MO) that contains information, normally not available to the receiver of IP packets,
    to perform passive network measurements. In particular, measurements that need
    a sender time stamp and a packet order number are then possible directly at the
    receiver. The information contained in the IP MO can also be used by hosts en-route
    to perform slightly more limited passive network measurements.</p>"
