abstract:
- content: "<p>Ogg Skeleton defines a logical bitstream that provides structuring
    information for multitrack Ogg files. It provides clues for synchronization and
    content negotiation including language selection. It also provides keypoint indices
    for optimal seeking over high- latency connections or in time-critical scenarios.</p>"
