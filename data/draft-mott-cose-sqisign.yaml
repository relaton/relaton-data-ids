abstract:
- content: "<p>*NOTE: This document describes a signature scheme based on an algorithm
    currently under evaluation in the NIST Post-Quantum Cryptography standardization
    process. Be aware that the underlying primitive may change as a result of that
    process.* This document specifies the algorithm encodings and representations
    for the SQIsign digital signature scheme within the CBOR Object Signing and Encryption
    (COSE) and JSON Object Signing and Encryption (JOSE) frameworks. SQIsign is an
    isogeny-based post-quantum signature scheme that provides the most compact signature
    and public key sizes of any candidate in the NIST Post-Quantum Cryptography (PQC)
    standardization and on-ramp-to-standardization processes. The standardization
    of SQIsign will be helpful to address current infrastructure bottlenecks, specifically
    the FIDO2 CTAP2 specification used by billions of in-service devices and browser
    installations. Depending on authenticator implementation, transport (USB/NFC/BLE)
    and message fragmentation support. Some deployments of CTAP2-based authenticators
    enforce limits near 1024 bytes for external key communication, and some standardized
    post-quantum signature schemes increase message sizes and may stress constrained
    authenticators or transports. As a result CBOR-encoded messages may hit limits
    in some authenticators. SQIsign-L1, L2 and L5 signatures are small enough to enable
    delivery over constrained networks like 802.15.4 and may be more suitable for
    constrained networks due to smaller signature sizes. This document clarifies that
    SQIsign does not expose the auxiliary torsion-point information exploited in the
    SIDH/SIKE attacks. Consequently, the specific attack techniques of Castryck–Decru
    do not directly apply. However, the scheme remains subject to ongoing cryptanalysis
    of isogeny-based constructions. By establishing stable COSE and JOSE identifiers,
    this document ensures the interoperability required for the seamless integration
    of post-quantum security into high-density, bandwidth-constrained, and legacy-compatible
    hardware environments.</p>"
