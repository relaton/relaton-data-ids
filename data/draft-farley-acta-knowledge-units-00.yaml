abstract:
- content: "<p>This document defines the Knowledge Unit (KU) format for representing
    verified knowledge produced through structured multi-model deliberation. A Knowledge
    Unit captures the question asked, the models that participated, the consensus
    achieved, the points of agreement and disagreement, and the cryptographic receipts
    that bind each deliberation round to an independently verifiable chain. The format
    addresses the epistemic integrity gap in LLM-maintained knowledge bases: how to
    prove that knowledge was derived through a rigorous process, that disagreement
    was preserved rather than smoothed away, and that the record has not been tampered
    with. This specification complements draft-farley-acta-signed-receipts, which
    defines the receipt format and verification protocol used to sign individual deliberation
    rounds.</p>"
