abstract:
- content: "<p>Some DNS recursive resolver operators want to reduce the number of
    queries they send to the root servers of the global DNS in order to give faster
    responses to their clients. Some DNS recursive resolver operators want to prevent
    snooping by third parties of requests sent to DNS root servers. In both cases,
    resolvers can reduce the number of queries sent to root server, and thus prevent
    observation of requests, by caching a copy of the full root zone. This document
    shows how a resolver can securely receive the full root zone and put it into the
    resolver's cache. This document obsoletes RFC 8806.</p>"
