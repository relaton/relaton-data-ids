abstract:
- content: "<p>In certain networks, network performance data such as packet loss,
    delay, and delay variation, as well as bandwidth utilization, are critical measures
    for Traffic Engineering (TE). These data provide operators with the characteristics
    of their networks for the performance evaluation required to provide Service-Level
    Agreements (SLAs). Stateful Path Computation Element Communication Protocol (PCEP)
    extensions have been defined for TE LSPs for Segment Routing (SR) and RSVP. This
    document describes the PCEP extensions for enabling and reporting end-to-end performance
    measurement and liveness detection for both PCE-Initiated and PCC-Initiated LSPs
    for SR-TE over MPLS and IPv6 data planes, and MPLS-TE using RSVP to an Active
    Stateful PCE.</p>"
