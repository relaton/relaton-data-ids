abstract:
- content: "<p>This document defines a conceptual framework for handling identity
    assertions in application-layer protocols. It introduces a model in which identity
    on the Internet is optional, but any asserted identity MUST be verifiable. It
    further defines a delegation mechanism that allows entities to authorize third-party
    infrastructure to act on their behalf in a verifiable and transparent manner.
    The goal is to reduce identity misrepresentation while fully preserving the ability
    for anonymous and pseudonymous interaction. This document does not define a protocol;
    it defines the principles that protocol specifications SHOULD follow when addressing
    agent identity. A concrete protocol implementation of these principles is defined
    in [SAIP].</p>"
