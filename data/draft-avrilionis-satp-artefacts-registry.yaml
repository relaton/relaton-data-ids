abstract:
- content: "<p>This memo describes the Artefacts Registry for Asset Exchange API.
    The Registry is a component that exposes an API allowing gateways to fetch information
    related to the SAT protocol. Examples information stored in the Artefacts Registry
    are network identifiers, entities identifiers, asset profiles, or asset instances.
    Registries are are acting as persistent storage locations for records. Once registered,
    records can be updated in an append-only manner.</p>"
