abstract:
- content: "<p>Multi-Path Traffic Engineering (MPTE) combines Traffic Engineering
    with Multi-Path forwarding, offering a much desired TE solution for both traditional
    WAN and new AIML DC/DCI. MPTE tunnels are based on MPTE Directed Acyclic Graph
    (DAG) and can be signaled with extensions to RSVP-TE, PCEP, BGP. This document
    specifies the BGP protocol extensions and procedures for signaling MPTE DAGs.</p>"
