abstract:
- content: "<p>This document specifies a verifiable telemetry ledger profile for resource-constrained
    sensing environments. It defines the gateway- side contract for accepting framed
    telemetry, enforcing anti-replay policy, projecting accepted frames into canonical
    facts, computing deterministic daily Merkle commitments, chaining day records,
    and binding authoritative day artifacts to external timestamp evidence. OpenTimestamps
    (OTS) is the default anchoring channel; RFC 3161 timestamp responses and peer
    signatures are optional parallel channels. The goal is interoperability and independent
    auditability, not new cryptographic primitives. Verification claims are limited
    by the disclosed artifacts, the claimed disclosure class, and the checks the verifier
    actually executes. A successful result establishes internal consistency and correct
    proof binding for the disclosed bundle; it does not by itself establish dataset
    completeness, physical truth of measurements, or safety for autonomous actuation.</p>"
