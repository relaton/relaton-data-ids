abstract:
- content: "<p>This document describes an architecture for AI agents that autonomously
    discover, interpret, and interact with Internet of Things (IoT) devices using
    the Constrained Application Protocol (CoAP) and hypermedia-driven patterns. It
    defines how a Large Language Model (LLM) based agent decomposes high-level user
    intents into concrete device interactions without requiring pre-configured device
    knowledge, relying instead on in-band resource discovery, CoRE Link Format metadata,
    and Semantic Definition Format (SDF) models. The document covers resource discovery,
    normalized representation for agent consumption, tool interfaces, observation
    patterns for closed- loop automation, web-based monitoring interfaces, and security
    considerations.</p>"
