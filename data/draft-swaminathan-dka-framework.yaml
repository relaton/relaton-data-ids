abstract:
- content: "<p>This document specifies the Domain Key Authority (DKA) framework, a
    DNS-anchored public-key distribution mechanism for the email-address namespace.
    The framework enables an Internet domain to designate an authoritative key service
    that verifies, stores, and distributes selector-scoped public keys for email-address
    identifiers under that domain. A Fallback DKA (fDKA) provides coverage for identifiers
    whose domains have not deployed a DKA, addressing the bootstrapping problem that
    has hindered comparable proposals. The result is a decentralized, deterministic,
    and application-agnostic framework for verified public-key discovery that supports
    incremental deployment and cryptographic agility.</p>"
