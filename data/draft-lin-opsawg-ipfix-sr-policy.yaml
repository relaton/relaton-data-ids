abstract:
- content: "<p>This document defines new IP Flow Information Export (IPFIX) Information
    Elements (IEs) to export attributes of Segment Routing (SR) and Segment Routing
    over IPv6 (SRv6) policies applied to IP flows, which enables correlation between
    observed traffic flows and the SR/SRv6 policies that carry them.</p>"
