abstract:
- content: "<p>This document defines the Judgment Event Protocol (JEP), a minimal
    verifiable log format for decision-related operations in agent systems. JEP specifies
    four immutable event verbs (J, D, T, V), a signed JSON event structure, anti-replay
    protection, detached JSON Web Signature (JWS) verification over JSON Canonicalization
    Scheme (JCS) canonicalized payloads, event hash and reference semantics, validation
    modes, and a modular extension framework. JEP is intended to provide global protocol-level
    interoperability for verifiable decision event records. It does not define legal
    liability, authorization validity, regulatory compliance, or organizational trust
    decisions.</p>"
