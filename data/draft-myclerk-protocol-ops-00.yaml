abstract:
- content: <p>This document defines the application-layer operation codes for the
    MyClerk Protocol. It serves as the authoritative registry for operation codes
    in the 0x0700-0x1DFF range, covering knowledge management, settings, messaging,
    telephony, calendar, tasks, smart home, automation, AI assistant, synchronization,
    orchestration, presence, health, location, plugins, mobile device management,
    legal documents, mobility, travel, audit, audio pipeline, and desktop client operations.
    This companion document follows the "Assigned Numbers" pattern established by
    Bluetooth SIG specifications, separating the operation registry from the core
    protocol specification to allow independent evolution of application operations.</p>
