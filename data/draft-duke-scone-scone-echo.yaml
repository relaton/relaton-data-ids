abstract:
- content: "<p>The SCONE protocol relies on the receiver of SCONE packets to send
    bandwidth estimates back to the sender via unspecified application- layer messages.
    In some cases, a peer might have SCONE receive capability at the QUIC layer but
    not implement the necessary application level functionality. A new QUIC frame
    that directly reports the contents of received SCONE packets can address these
    use cases. There are no changes in the interaction with SCONE Network Elements.</p>"
