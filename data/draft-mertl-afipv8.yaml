abstract:
- content: "<p>This memo describes an alternate entry and display format for IPv6
    addresses using UTF-8 instead of hextets. A mixed representation for traditional
    IPv6 address prefixes also is explored, along with means of transitioning between
    the two within an IPv6 address. Additionally, an address extension is proposed
    to accommodate the inevitable need for longer addresses. Finally, security implications
    of special UTF-8 glyphs are considered.</p>"
