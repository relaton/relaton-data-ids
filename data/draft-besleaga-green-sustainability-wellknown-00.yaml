abstract:
- content: <p>This document defines the "sustainability" well-known URI. This URI
    provides a standardized, out-of-band mechanism for web servers and digital services
    to publish their aggregated environmental impact, energy consumption, and carbon
    footprint metrics. By utilizing an asynchronous reporting model, this approach
    allows for transparent environmental accounting without the bandwidth and energy
    overhead associated with per-request HTTP headers.</p>
