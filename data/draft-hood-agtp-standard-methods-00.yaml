abstract:
- content: "<p>The Agent Transfer Protocol (AGTP) defines a core method vocabulary
    (Tier 1) of twelve intent-based methods covering the most common agent operations.
    This document defines the Tier 2 Standard Extended Method Vocabulary: methods
    registered in the IANA AGTP Method Registry that are available for use in any
    AGTP implementation but are not required for baseline compliance. Methods are
    organized into six categories reflecting the full operational range of AI agent
    systems: ACQUIRE, COMPUTE, TRANSACT, INTEGRATE, COMMUNICATE, and ORCHESTRATE.
    This document also specifies the QUOTE method referenced in the AGTP core specification
    for pre-flight resource cost estimation. The six-category taxonomy is aligned
    with the ACTION framework described in [AGENTIC-API].</p>"
