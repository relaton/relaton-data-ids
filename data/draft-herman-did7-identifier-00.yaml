abstract:
- content: <p>This document defines the "did7" URI scheme, an authority-scoped decentralized
    identifier format. DID7 introduces an optional authority component and a two-stage
    resolution process, while remaining fully compatible with the W3C Decentralized
    Identifiers (DIDs) v1.0 specification (DID Core).</p>
