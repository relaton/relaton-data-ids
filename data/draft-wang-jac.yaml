abstract:
- content: "<p>This document defines the Judgment Accountability Chain (JAC) v0.0,
    a minimal infrastructure layer for tracking judgment chains in AI and agent systems.
    Built on JEP [draft-wang-jep-judgment-event-protocol-01] and HJS [draft-wang-hjs-accountability-02],
    JAC adds a single field—task_based_on—to establish verifiable causality between
    judgments across agents, platforms, and trust domains. JAC follows the same narrow-waist
    design philosophy as JEP and HJS: a minimal mandatory core with all advanced features
    defined as optional extensions.</p>"
