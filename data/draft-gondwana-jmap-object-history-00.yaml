abstract:
- content: "<p>The JMAP base protocol (RFC8620) provides methods for synchronizing
    the current state of data objects between client and server. This extension adds
    the ability to retrieve historical versions of objects, including objects that
    have been destroyed, by extending the standard Foo/get method.</p>"
