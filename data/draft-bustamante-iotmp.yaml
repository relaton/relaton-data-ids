abstract:
- content: "<p>IOTMP (Internet of Things Message Protocol) is a compact, binary, application-layer
    protocol for bidirectional communication between IoT devices and servers over
    persistent connections. It provides a resource-oriented model with native support
    for remote procedure calls, real-time data streaming, and API introspection. IOTMP
    uses PSON (Packed Sensor Object Notation) as its data encoding format, achieving
    significantly lower wire overhead than text-based alternatives. The protocol is
    designed for constrained devices with limited memory and bandwidth, while remaining
    expressive enough for complex IoT applications. IOTMP operates over TCP, TLS,
    or WebSocket transports and supports symmetric operation where both clients and
    servers may expose and invoke resources.</p>"
