abstract:
- content: "<p>This document defines a domain profile of the Operating Model Protocol
    (OMP) for high-risk AI systems subject to the Colorado Artificial Intelligence
    Act (SB 24-205, effective June 1, 2026), which requires deployers of high-risk
    AI systems in consequential decisions affecting Colorado consumers to implement
    risk management programmes, provide consumer disclosures, conduct impact assessments,
    and implement discrimination mitigation measures. The profile -- designated ColoradoMark
    -- specifies how OMP's deterministic routing invariant, Watchtower enforcement
    framework, and three-layer cryptographic integrity architecture satisfy the Colorado
    AI Act's per-decision accountability obligations and align with the NIST AI RMF
    1.0, providing a unified cross-sector accountability evidence architecture for
    the six Colorado AI Act consequential decision domains. The OMP core specification
    is defined in the Operating Model Protocol Internet-Draft (draft-veridom-omp).</p>"
