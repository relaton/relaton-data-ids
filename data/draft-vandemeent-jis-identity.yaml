abstract:
- content: "<p>This document defines JIS (JTel Identity Standard), a protocol for
    establishing identity, negotiating trust, and binding intent declarations to actor
    interactions. JIS provides three core mechanisms: a dual-keypair identity model
    separating human-device binding (HID) from device authentication (DID), a trust
    establishment handshake (FIR/A) that negotiates capabilities and records intent,
    and a human-readable context layer (Humotica) that captures the sense, context,
    intent, and explanation for every interaction. JIS is transport-agnostic and operates
    as a semantic layer above existing protocols. It integrates with TIBET [TIBET]
    for provenance tracking, and is consumed by UPIP [UPIP], RVP [RVP], and AINS [AINS]
    for process integrity, continuous verification, and agent discovery respectively.</p>"
