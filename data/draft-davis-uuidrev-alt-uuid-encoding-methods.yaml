abstract:
- content: "<p>This document presents considerations and best practices for alternate
    Universally Unique Identifier (UUID) encoding methods observed in the industry.
    This document updates RFC9562 to provide suggested alternate encoding methods,
    best practices and the various implementation considerations required for choosing
    the correct encoding for an application. When selected correctly, these alternate
    UUID encodings perform better on the wire, in a database, or within various other
    application logics versus the unnecessarily verbose text representation from RFC9562.</p>"
