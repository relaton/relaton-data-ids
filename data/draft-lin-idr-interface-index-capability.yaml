abstract:
- content: "<p>In some scenarios using unnumbered links, it is necessary for the BGP
    protocol to advertise the link's Interface Index and obtain the peer's Remote
    Interface Identifier. This document defines a new BGP capability [RFC 5492] for
    advertising local interface indexes and obtaining neighbor interface indexes.</p>"
