abstract:
- content: "<p>The Media over QUIC Transport (MoQT) protocol presents denial-of- service
    risks that differ in character from those facing typical request-response protocols.
    MoQT relays forward, fan out, and optionally cache media content on behalf of
    publishers and subscribers. This document complements the MoQT Security Considerations,
    focusing on the unique considerations for relays.</p>"
