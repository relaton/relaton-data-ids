abstract:
- content: "<p>This document defines two HTTP header fields and one Accept-Signature
    parameter for use with HTTP Message Signatures as defined in RFC 9421. The Signature-Key
    request header distributes public keys used to verify signatures, with five initial
    key distribution schemes: pseudonymous inline keys (hwk), self-issued key delegation
    via JWK Thumbprint JWTs (jkt-jwt), identified signers with JWKS URI discovery
    (jwks_uri), JWT-based delegation (jwt), and X.509 certificate chains (x509). The
    sigkey parameter extends Accept-Signature (RFC 9421 Section 5) to indicate the
    type of Signature-Key the server requires. The Signature-Error response header
    provides structured error information when signature verification fails. Together,
    these mechanisms enable flexible trust models ranging from privacy- preserving
    pseudonymous verification to horizontally-scalable delegated authentication and
    PKI-based identity chains.</p>"
