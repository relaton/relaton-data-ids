abstract:
- content: "<p>This draft defines new autonomic technical objectives for automatic
    congestion relief using the Grasp protocol acording to the [RFC 9222]. In operator
    networks, network devices can automatically respond and achieve real-time self-healing
    for network failures such as fiber optic cable faults and optical module malfunctions</p>"
