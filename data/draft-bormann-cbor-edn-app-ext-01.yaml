abstract:
- content: '<p>The CBOR Extended Diagnostic Notation (EDN), to be standardized in
    draft-ietf-cbor-edn-literals, provides "application extensions" as its main language
    extension point. A number of application extensions are already defined in draft-ietf-
    cbor-edn-literals itself and in draft-ietf-cbor-edn-e-ref. The present document
    defines a number of additional application extensions that have been batched up
    as a next step after completing these specifications. ( // Chore: Briefly List
    extensions.) // This -01 of an individual submission is a slight update of -00,
    // which showed the approximate shape the first "batch" of // application extensions
    could have, plus a number of registrations // that could go into this batch. The
    latter provides a basis for a // technical discussion of those registrations.</p>'
