abstract:
- content: "<p>This document applies only to non-trivial extensions of TLS, which
    require formal analysis. It proposes the authors specify a threat model and informal
    security goals in the Security Considerations section, as well as motivation and
    a protocol diagram in the draft. We also briefly present a few pain points of
    the team doing the formal analysis which -- we believe -- require refining the
    process: * Contacting FATT * Understanding the opposing goals * Response within
    reasonable time frame * Discussion at meeting * Provide protection against FATT-bypass
    by other TLS-related WGs * Process not being followed</p>"
