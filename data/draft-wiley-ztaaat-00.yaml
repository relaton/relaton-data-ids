abstract:
- content: "<p>This document defines a mechanism for verifying boolean eligibility
    claims using cryptographically signed assertion tokens. A relying party can verify
    authoritative answers to predefined claims without trusting the presenting subject
    and without learning the subject's identity. Each assertion token encodes exactly
    one boolean claim. The system guarantees authenticity and integrity of claim assertions.
    It does not provide identity, authentication, or subject uniqueness.</p>"
