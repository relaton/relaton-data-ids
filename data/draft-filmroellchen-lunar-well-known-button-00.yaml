abstract:
- content: <p>This document specifies the well-known URI /.well-known/button.json,
    which describes a web site's "buttons". Buttons are usually 88x31 pixel images
    representing the web site with text, logos, artwork, and animations. /.well-known/button.json
    files facilitate sharing buttons between web site owners and alleviate issues
    commonly encountered when doing so. By utilizing a standardized, machine-readable
    format, automated tools can also utilize the provided information.</p>
