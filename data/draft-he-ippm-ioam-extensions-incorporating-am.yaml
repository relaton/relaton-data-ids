abstract:
- content: "<p>In situ Operation, Administration, and Maintenance (IOAM) is used for
    recording and collecting operational and telemetry information, which leverages
    IOAM Trace Option to incorporate IOAM data fields into in- flight data packets.
    The Alternate-Marking method is used to measure performance metrics on live traffic,
    such as packet loss, delay, and jitter. This document extends IOAM Trace Option
    for incorporating the Alternate-Marking method to augment IOAM in performance
    measurement.</p>"
