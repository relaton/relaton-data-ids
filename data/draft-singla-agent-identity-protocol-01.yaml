abstract:
- content: "<p>The Agent Identity Protocol (AIP) defines a decentralized identity,
    delegation, and authorization framework for autonomous AI agents. AIP combines
    W3C Decentralized Identifiers (DIDs), capability-based authorization, cryptographic
    delegation chains, and deterministic validation to enable secure, auditable multi-agent
    workflows without relying on centralized identity providers.</p>"
