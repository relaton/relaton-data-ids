abstract:
- content: "<p>This document analyzes the selection of Attested Transport Layer Security
    (aTLS) protocols, among pre-handshake, intra-handshake, and post-handshake aTLS
    protocols, focusing on the trade-off between theoretical security strength and
    practical deployability. The goal is to enable flexible, context-aware deployment
    of endpoint attestation while maintaining compatibility with existing infrastructure.</p>"
