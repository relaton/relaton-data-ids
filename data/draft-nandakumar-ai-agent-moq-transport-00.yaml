abstract:
- content: "<p>This document defines a protocol abstraction layer that enables Media
    over QUIC Transport (MOQT) to serve as a unified transport substrate for inter-agent
    communication protocols. The abstraction provides a common mapping of request-response
    and streaming patterns onto MOQT's publish/subscribe model, allowing diverse agent
    protocols to leverage MOQT's real-time streaming capabilities, built-in prioritization,
    and efficient multiplexing over QUIC. The document demonstrates the application
    of this abstraction to two prominent inter-agent protocols: the Agent-to-Agent
    (A2A) protocol [A2A], which focuses on agent discovery, task delegation, and collaboration;
    and the Model Context Protocol (MCP) [MCP], which provides tool and resource access
    for agents. This unified approach enables interoperability across diverse agent
    ecosystems while preserving each protocol's semantics.</p>"
