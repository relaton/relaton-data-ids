abstract:
- content: "<p>This document specifies Web 7.0 Verifiable Trust Circles (VTCs), a
    generalized mechanism for expressing verifiable multi-party membership, belonging,
    and trust relationships using the W3C Verifiable Credentials (VC) Data Model 2.0
    [W3C.VC-DATA-MODEL] and VC Data Integrity Proof Sets [W3C.VC-DATA-INTEGRITY].
    VTCs extend the Partof Architecture Reference Model (PARM) to provide a universal
    credential pattern that subsumes prior pairwise constructs (Personhood Credentials
    (PHCs) and Verifiable Relationship Credentials (VRCs)) and additionally supports
    voting-based decision making, meeting requests, task forces, and digital societies.</p>"
