abstract:
- content: "<p>The Reilly Government Integrity Protocol (RGIP) defines a standards-aligned
    method for producing permanent, independently verifiable public records by combining
    multi-algorithm content hashing, public blockchain anchoring via OpenTimestamps,
    DOI-based archival, decentralized storage, and web archiving into a single automated
    pipeline. This revision (01) expands the protocol to incorporate a Triple-Hash
    Chain architecture running SHA-256 [RFC6234], SHA3-512 [FIPS202], and BLAKE3 [BLAKE3]
    in parallel, bound together by a cryptographic Cross-Chain Hash at every block.
    RGIP introduces the REMID (Reilly EternaMark Identifier), a self- sovereign persistent
    identifier derived directly from artifact content, replacing reliance on externally
    assigned identifiers as the sole chain anchor. The protocol specifies the Evidence
    Receipt (ER), an expanded canonicalized metadata object binding the artifact's
    triple-hash fingerprint, a REMID, a DOI, an OpenTimestamps Bitcoin proof, an IPFS
    CID, and an Internet Archive URI. Processing steps, chain integrity procedures,
    autonomous verification, and post-quantum resilience properties are defined.</p>"
