abstract:
- content: "<p>This document defines a benchmarking methodology for evaluating RPKI
    Relying Party (RP) implementations in controlled laboratory environments. The
    methodology focuses on whether RP implementations correctly perform required validation
    steps and on the performance of these operations. RP implementations are treated
    as black boxes, enabling consistent and objective assessment based on externally
    observable behavior rather than internal design or implementation details.</p>"
