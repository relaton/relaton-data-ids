abstract:
- content: "<p>We envision the scale-up, scale-out, and scale-across networks for
    AI computing would eventually converged. The draft describes a scheme for L3 packet
    header compression in converged AI networks where IPv6 are assumed to be the L3
    protocol, and a unified fabric supports all kinds of traffic. The header size
    can be reduced to 8 octets for packets transferred with a single super-node, representing
    80% overhead saving. The document discusses the motivation, requirements, benefits,
    and feasibility in addition to the header format proposal.</p>"
