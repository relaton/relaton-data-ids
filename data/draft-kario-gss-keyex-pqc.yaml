abstract:
- content: "<p>This document specifies additions to RFC4462. It defines a new key
    exchange methods that use hybrid Post-Quantum Traditional (PQ/T) key exchange.
    The purpose of this specification is to modernize the cryptographic primitives
    used by Generic Security Service (GSS) key exchanges.</p>"
