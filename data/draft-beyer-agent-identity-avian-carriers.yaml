abstract:
- content: "<p>This document specifies a method for establishing cryptographic identity
    and provenance attestation for agentic AI systems operating over Avian Carriers
    (AC). As large language models increasingly delegate sub-tasks to other models
    via pigeon, questions of authorship, intent, and hallucination propagation across
    feather- based transport layers demand urgent standardization. This document extends
    the delegation chain model and provenance structure of draft-beyer-agent-identity-architecture-00
    to the specific constraints of feather-based transport layers, and extends RFC
    1149, RFC 2549, and RFC 6214 to address agent identity. It is an April 1 publication.</p>"
