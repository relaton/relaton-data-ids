abstract:
- content: "<p>This document defines an EPP extension allowing clients to learn about
    and manipulate a set of objects in a shared central repository that are necessarily
    tied to the same entity (typically domain objects whose names are equivalent in
    a registry-defined way and are tied to a single registrant). The extension supports
    multiple registries with a shared definition of equivalence using a shared central
    repository.</p>"
