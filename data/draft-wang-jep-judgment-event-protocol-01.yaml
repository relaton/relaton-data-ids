abstract:
- content: "<p>This document specifies the Judgment Event Protocol (JEP), a minimal,
    verifiable format for logging judgment-related actions in distributed systems.
    It defines four immutable event verbs (J, D, T, V), a signed JSON event structure
    with replay protection, and standardized signature verification rules. The protocol
    is designed to be interoperable across platforms and autonomous agents, and may
    be used either natively or as a foundation for extended accountability, audit,
    and decision provenance frameworks.</p>"
