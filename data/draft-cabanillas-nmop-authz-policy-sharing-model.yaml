abstract:
- content: "<p>This document defines mechanisms and conventions for the representation,
    lifecycle management, and distribution of authorization policies in distributed
    and automated environments. It specifies a consistent, machine-readable, and interoperable
    framework that enables policies to be validated, versioned, exchanged, and removed
    across heterogeneous systems and domains. The framework defines how authorization
    policies, expressed in declarative Policy-as-Code (PaC) languages, are encapsulated,
    managed, and distributed using YANG as the canonical representation format. This
    separation allows independent evolution of policy languages, enforcement architectures,
    and trust models.</p>"
