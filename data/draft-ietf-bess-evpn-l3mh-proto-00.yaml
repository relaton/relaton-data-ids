abstract:
- content: "<p>This document describes the use of EVPN Ethernet Segment Link Aggregation
    Group (ES-LAG) technology to provide multi-homing redundancy for Layer 3 services.
    The solution synchronizes ARP/ND, multicast state, and IGP routes between redundant
    PEs without requiring Layer 2 constructs or proprietary Inter-Chassis Communication
    protocols.</p>"
