abstract:
- content: "<p>This document describes CTP/0, the definition layer of the Cognitive
    Time Protocol (CTP) family. CTP/0 is a conceptual reference framework for representing,
    comparing, and referencing time-related claims in AI and agent systems. It defines
    terminology for cognitive events, event-density claims, ordering claims, branching
    claims, and declared emergent temporal-structure claims. CTP/0 does not define
    a wire protocol, message format, signature format, hash-chain format, governance
    process, physical theory of time, theory of consciousness, or legal accountability
    framework. Where verifiable records are needed, CTP-compatible claims can be bound
    to external event or receipt infrastructure such as JEP, HJS, JAC, COE, or CEP.
    This revision narrows the original CTP/0 draft to an informational framework.
    Metrics such as Cognitive Event Density (CED), Causal Arrow Entropy (CAE), Verifiable
    Delay Function (VDF) evidence, and time-related evidence chains are treated as
    optional claim or evidence profiles, not as universal measures of intelligence,
    cognition, truth, safety, or responsibility.</p>"
