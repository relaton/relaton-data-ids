abstract:
- content: "<p>The Internet of Agents (IoA) requires a robust infrastructure to manage
    the lifecycle, discovery, and interaction of autonomous agents across distributed
    network domains. While the Agent Gateway (AGW) provides a localized control point,
    large-scale deployments necessitate a mechanism for multiple gateways to synchronize
    agent metadata and routing information. This document specifies the Agent Metadata
    Synchronization Protocol (AMSP). AMSP facilitates the exchange of Agent Records
    between hierarchical gateways (Level-1 and Level-2), ensuring global reachability,
    efficient resource utilization, and loop-free metadata propagation.</p>"
