abstract:
- content: "<p>Autonomous AI agents execute transactions across organizational boundaries.
    No single agent platform provides the trust infrastructure they need. This document
    defines the Agent Name Service (ANS) v2 protocol, which anchors every agent identity
    to a DNS domain name. A Registration Authority (RA) verifies domain ownership
    via ACME, issues dual certificates (a Server Certificate from a public CA and
    an Identity Certificate from a private CA binding a version-specific ANSName),
    and seals every lifecycle event into an append-only Transparency Log aligned with
    IETF SCITT. Three verification tiers -- Bronze (PKI), Silver (PKI + DANE), and
    Gold (PKI + DANE + Transparency Log) -- let clients choose assurance levels appropriate
    to transaction risk. The architecture decouples identity from discovery: the RA
    publishes sealed events; independent Discovery Services build competitive indexes.
    A three-layer trust framework separates foundational identity (Layer 1, this protocol),
    operational maturity (Layer 2, third-party attestors), and behavioral reputation
    (Layer 3, real-time scoring).</p>"
