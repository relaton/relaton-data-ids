abstract:
- content: "<p>This document defines the Monotonic Attestation Service (MAS), a protocol
    for issuing cryptographically attested, monotonically increasing sequence numbers
    within named namespaces. Each attestation includes a hash chain linking it to
    all prior entries in the namespace, providing verifiable proof of ordering and
    completeness. MAS is designed to complement RFC 3161 Trusted Timestamping: where
    RFC 3161 proves when an event occurred, MAS proves in what order and that the
    sequence is complete.</p>"
