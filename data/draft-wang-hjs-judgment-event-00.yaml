abstract:
- content: "<p>This document defines HJS, a specialized protocol for judgment attribution
    — determining who is responsible for AI decisions, when, and under what authority
    — and enables portable, verifiable judgment transfer across heterogeneous AI systems.
    HJS addresses one specific problem that complementary systems do not: binding
    decisions to accountable actors, tracking how responsibility transfers over time,
    and providing cryptographic credentials that allow AI agents to prove decision
    authority to external systems without requiring prior trust relationships. It
    works alongside provenance frameworks (VAP), security protocols (SEAT), monitoring
    platforms (Arize, WhyLabs), and governance systems (Fiddler), providing the attribution
    layer these systems complement. HJS contributes standardized judgment events,
    portable cryptographic Receipts that serve as verifiable credentials for cross-system
    delegation, and flexible verification modes for diverse deployment scenarios.</p>"
