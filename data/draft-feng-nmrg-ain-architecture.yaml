abstract:
- content: "<p>The rapid proliferation of autonomous AI agents across enterprise and
    Internet-scale deployments creates a structural challenge that existing agent
    frameworks cannot address: how to enable any agent to discover and invoke any
    other agent's capabilities without pre- established bilateral integration, across
    organizational boundaries, at Internet scale. This document presents the Agentic
    Intent Network (AIN) as an architecture-level model for open, heterogeneous, dynamically
    evolving multi-agent coordination. It defines problem drivers, architectural and
    underlay requirements, architectural components, design invariants, scope boundaries,
    and a research agenda for the NMRG. Engineering protocol details are intentionally
    out of scope.</p>"
