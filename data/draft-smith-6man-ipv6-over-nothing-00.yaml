abstract:
- content: "<p>A perspective on the function of the network layer is that it abstracts
    away the differences between the various underlying link layer frame and addressing
    formats, unifying them into a common protocol data unit format and addressing
    scheme, namely the IPv4 or IPv6 protocols, and hiding those details from the upper
    transport layer protocols. As IPv6 is expected to become the dominant network
    layer protocol, and Ethernet has become the dominant link-layer protocol, this
    memo proposes eliminating the overhead of the abstraction of Ethernet by IPv6
    and using IPv6 directly as both the link-layer and network layer protocol.</p>"
