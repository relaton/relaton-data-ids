abstract:
- content: "<p>One IPsec area that would be impacted by Cryptographically Relevant
    Quantum Computer (CRQC) is IKEv2 authentication based on traditional asymmetric
    cryptographic algorithms: e.g RSA, ECDSA, which are widely deployed authentication
    options of IKEv2. There are new Post-Quantum Cryptographic (PQC) algorithms for
    digital signature like NIST [ML-DSA], However, it takes time for new cryptographic
    algorithms to mature, There is security risk to use only the new algorithm before
    it is field proven. This document describes a hybrid PKI authentication scheme
    for IKEv2 that incorporates both traditional and PQC digital signature algorithms,
    so that authentication is secure as long as one algorithm in the hybrid scheme
    is secure.</p>"
