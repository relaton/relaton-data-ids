abstract:
- content: "<p>This document specifies the Agentic Integrity Verification Standard
    (AIVS), a portable, self-verifiable archive format for cryptographic proof of
    AI agent sessions. An AIVS proof bundle is a gzip- compressed tar archive containing
    a SHA-256 hash-chained audit log, an Ed25519 digital signature over the chain,
    a machine-readable manifest, and an embedded verification script that requires
    only the Python 3 standard library to execute. AIVS also defines AIVS-Micro: a
    minimal six-field attestation (~200 bytes) for continuous monitoring and API contexts
    where a full session bundle is not required. AIVS enables any party to independently
    verify that every action in an agent session is accounted for and unmodified,
    that no actions have been inserted, deleted, or reordered, and that the session
    was produced by a specific cryptographic identity — entirely offline, without
    installing any software beyond Python 3.</p>"
