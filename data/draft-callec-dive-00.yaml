abstract:
- content: "<p>Domain-based Integrity Verification Enforcement (DIVE) version 0.1
    is an application-layer protocol that provides cryptographic integrity and authenticity
    verification of web resources by leveraging the Domain Name System Security Extensions
    (DNSSEC) as an independent verification channel. DIVE operates as an additional
    security layer above HTTP and HTTPS. Public keys and policy configuration are
    published as DNS TXT records protected by DNSSEC, while HTTP response headers
    carry per-resource cryptographic signatures. A client implementing DIVE verifies
    each covered resource against the corresponding DNS-published public key before
    accepting it. An attacker must therefore compromise both the DNS infrastructure
    and the origin server simultaneously in order to deliver a tampered resource to
    a DIVE-compliant client. This document defines the DNS record format, the HTTP
    header format, the client verification algorithm, the reporting mechanism, and
    the operational recommendations for the DIVE 0.1 protocol.</p>"
