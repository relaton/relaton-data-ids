abstract:
- content: "<p>This document defines the rules for representing the RESTful Provisioning
    Protocol (RPP) data objects, as defined in [I-D.kowalik-rpp-data-objects], using
    the JavaScript Object Notation (JSON) Data Interchange Format [RFC8259]. It specifies
    how RPP primitive types, common data types, component objects, resource objects,
    and associations are mapped to JSON and JSON Schema, and provides normative JSON
    Schema definitions and worked examples for domain name, contact, and host data
    objects.</p>"
