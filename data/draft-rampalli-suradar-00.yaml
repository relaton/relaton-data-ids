abstract:
- content: "<p>This document defines SURADAR (Subsurface Undertow RADAR), an HTTP
    authentication scheme in which each request is authenticated by a one-time HMAC
    tag derived from a shared seed, the current time band, and the full request context
    (method, path, organisation, scope, and body). Unlike bearer-token schemes, a
    captured SURADAR token is cryptographically bound to exactly one request and cannot
    be reused, replayed, or re-scoped. The protocol requires zero per-request handshakes,
    produces 48-byte tokens, and relies solely on HMAC- SHA-256 and SHA-256 -- no
    asymmetric cryptography.</p>"
