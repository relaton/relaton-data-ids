abstract:
- content: "<p>The proliferation of distributed systems, Artificial Intelligence (AI)
    agents, cloud workloads, and network services has created a need for interoperable
    mechanisms to discover entities across administrative and network boundaries.
    Entities may include AI agents, software services, compute workloads, and other
    named resources that need to be found and characterised before interaction can
    begin. This document defines the requirements for Discovery of Agents, Workloads,
    and Named Entities (DAWN) and sets out the objectives that a discovery mechanism
    for such entities must satisfy. It describes what information must be discoverable,
    what properties a discovery mechanism needs to support, and what constraints apply
    to discovery in decentralised environments. This document does not specify any
    particular discovery protocol or solution.</p>"
