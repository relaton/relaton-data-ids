abstract:
- content: "<p>This document describes guidelines for assigning authorship in RFC
    documents, including guidelines for disclosing the use of artificial intelligence
    during document preparation. It also discusses the related issues of acknowledgements,
    editors and contributors. The various RFC streams may set their own guidelines,
    which will have priority.</p>"
