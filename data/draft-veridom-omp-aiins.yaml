abstract:
- content: "<p>This document defines a domain profile of the Operating Model Protocol
    (OMP) for AI systems deployed in contexts covered by AI liability insurance policies,
    including AI performance warranties, AI errors and omissions coverage, and coordinated
    AI liability structures. The profile -- designated InsureMark -- specifies how
    OMP's deterministic routing invariant, Watchtower enforcement framework, and three-layer
    cryptographic integrity architecture generate per-decision Proof-Points that function
    as objective parametric trigger data for AI liability insurance claims, and provide
    independently verifiable underwriting evidence that reduces claims ambiguity and
    supports premium differentiation. The InsureMark profile addresses the primary
    gap in current AI liability insurance underwriting: policies are currently issued
    based on model-level performance assessments, but claims arise at the level of
    individual AI decisions. No current AI liability insurance product requires or
    receives per-decision cryptographic evidence. This profile specifies the technical
    architecture by which OMP Proof- Points close this gap. The OMP core specification
    is defined in the Operating Model Protocol Internet-Draft (draft-veridom-omp).</p>"
