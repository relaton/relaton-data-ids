abstract:
- content: "<p>PSON (Packed Sensor Object Notation) is a compact binary data encoding
    format designed for IoT environments where bandwidth, memory, and processing power
    are constrained. PSON efficiently represents the data types commonly found in
    sensor telemetry and device interaction: integers, floating-point numbers, booleans,
    strings, binary blobs, arrays, and key-value maps. It achieves significant size
    reductions over JSON (40-75% for typical IoT payloads) through inline small value
    encoding and variable-length integers. PSON is self-describing (no external schema
    required for decoding) and designed for minimal implementation complexity on microcontrollers.</p>"
