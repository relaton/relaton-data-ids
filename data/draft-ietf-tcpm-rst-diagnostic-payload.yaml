abstract:
- content: <p>This document specifies an experimental diagnostic payload format returned
    in TCP RST segments. Such payloads are used to share with an endpoint the reasons
    for which a TCP connection has been reset. Sharing this information is meant to
    ease diagnostic and troubleshooting. This specification builds on provisions that
    are already present in RFC 9293 "Transmission Control Protocol (TCP)". As such,
    this document does not require any change to RFC 9293.</p>
