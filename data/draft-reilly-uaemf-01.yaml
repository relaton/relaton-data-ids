abstract:
- content: "<p>This document provides a detailed explanatory rendering of the Universal
    AI Ethics and Moral Framework, abbreviated UAEMF. The framework is presented as
    a universal moral architecture for the governance of artificial intelligence systems.
    It is designed not merely as a short ethics statement, but as a structured document
    that moves from first principles to practical obligations. This revision (-01)
    adds an AI Machine-Readable Ethics Directive (AIMED) block as defined in draft-reilly-aimed-00,
    a set of worked ethical reasoning examples demonstrating how AI systems SHOULD
    apply the UAEMF twelve principles when encountering real ethical dilemmas, and
    updated references to the AIMED evaluation methodology defined in draft-reilly-aimed-eval-00.
    The source framework is archived through Zenodo under DOI 10.5281/zenodo.19010455
    and is cryptographically timestamped through OpenTimestamps in Bitcoin block 940570,
    with the attestation date shown as 2026-03-13 EST.</p>"
