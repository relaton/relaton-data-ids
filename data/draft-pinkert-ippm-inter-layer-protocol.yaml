abstract:
- content: "<p>This document describes an inter-layer protocol, that can be used to
    insert an arbitrary number of headers between the internet protocol (IPv4, IPv6)
    header and a layer four header like the UDP or TCP header. By doing so, it consumes
    part of the space available for IP payload data. It is, in particular, useful
    to extend the space reserved for IP options as defined in the IPv4 protocol.</p>"
