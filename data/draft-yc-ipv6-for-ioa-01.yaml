abstract:
- content: "<p>In the coming years, the accelerating proliferation of agentic AI is
    anticipated to drive the number of intelligent agents to reach the scale of hundreds
    of billions. IPv6, with vast address space, native end-to-end connectivity and
    rich built-in functionalities, serves as the critical infrastructure underpinning
    the development of the Internet of Agents (IoA). This draft systematically analyzes
    the foundational capabilities that IPv6 can provide for the IoA at the current
    stage, and further explores the evolutionary requirements that the IoA imposes
    on the future IPv6 development.</p>"
