abstract:
- content: <p>Redundancy Protection is a generalized protection mechanism to achieve
    high reliability for service provided in Segment Routing networks. The mechanism
    uses the "Live-Live" methodology, i.e., multiple copies of the data packets are
    sent on different paths to provide protection. This document introduces one new
    SRv6 Segment Endpoint Behavior to provide replication and elimination functions
    on specific network nodes by leveraging SRv6 Network Programming capabilities.</p>
