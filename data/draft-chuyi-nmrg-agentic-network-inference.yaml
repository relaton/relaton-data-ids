abstract:
- content: "<p>With the advent of the era of AI large models and intelligent agents,
    more and more scenarios about agent interconnection have emerged, such as collaboration
    among multiple agents within a household, intelligent robots cooperating to complete
    pipeline tasks in different operations of the industrial Internet, drone groups,
    intelligent vehicle networking, etc. These scenarios not only require low latency
    and high bandwidth, but also demand efficient information exchange and cross-domain
    coordination and scheduling capabilities in complex collaborative tasks. Therefore,
    new orchestration and management technologies and frameworks are needed in existing
    networks to address this. The interconnection of different agents also brings
    about an emergence of inference, with a large number of inference requests being
    processed from the mobile phone side to the cloud. In order to improve inference
    efficiency, in a cloud-edge-end multi-layer inference architecture, large models
    and agents at different levels cooperate to complete tasks, resulting in a complex
    intelligent agent interconnection network. Gateways and routers serve as forwarding
    entries on the network road highways, responsible for building communication channels
    for the agents spread throughout the network, which requiring function upgrades
    to support the continuously evolving inference service in the future.</p>"
