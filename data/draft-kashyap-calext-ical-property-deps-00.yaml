abstract:
- content: "<p>RFC 5545 defines inter-property interaction rules for iCalendar components
    in prose scattered across multiple RFC sections. No published, standalone representation
    of these rules exists in a form suitable for machine consumption. This document
    specifies a formal dependency graph for VEVENT components with 27 properties and
    20 edges spanning six edge types. It classifies properties into five merge safety
    categories that determine whether concurrent edits can be combined without user
    intervention. The specification is published as YAML and JSON artifacts for cross-language
    consumption.</p>"
