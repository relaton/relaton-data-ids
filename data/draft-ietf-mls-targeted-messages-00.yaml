abstract:
- content: "<p>This document defines targeted messages for the Messaging Layer Security
    (MLS) protocol. A targeted message allows a member of an MLS group to send an
    encrypted and authenticated message to another member of the same group without
    creating a new group. The mechanism reuses Hybrid Public Key Encryption (HPKE)
    and the MLS key schedule to provide confidentiality, authentication, and binding
    to the group state.</p>"
