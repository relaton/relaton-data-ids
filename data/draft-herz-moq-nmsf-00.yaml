abstract:
- content: "<p>This document updates the MOQT Streaming Format (MSF) by defining a
    new optional feature for the streaming format. It specifies the syntax and semantics
    for adding Neural Video Codec (NVC) packaged media to MSF. NVC codecs use learned
    neural network transforms for video compression, and their bitstreams require
    a distinct packaging model from traditional block-based codecs. NMSF maps neural
    keyframes (Intra) and delta frames (Inter) onto MoQ Groups and Objects, enabling
    real-time neural video streaming over any standard MoQ relay.</p>"
