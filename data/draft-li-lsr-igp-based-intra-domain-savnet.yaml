abstract:
- content: "<p>SPA-based SAVNET is a new intra-domain source address validation (SAV)
    mechanism which requires exchanging and communicating SPA information among routers
    in an intra-domain network (see [I-D.li-savnet-source-prefix-advertisement]).
    Routers at the boundary automatically generate accurate SAV rules by using routing
    information and SPA information. These rules construct a validation boundary which
    checks the validity of the source address of any data packets flowing into the
    intra-domain network. This document describes a method to implement SPA-based
    SAVNET by using OSPF and IS-IS.</p>"
