abstract:
- content: "<p>This document specifies a mechanism for advertising unreachable prefixes
    across Autonomous Systems using BGP. The mechanism enables fast convergence in
    VPN services when backbone source nodes become unreachable, by allowing Unreachable
    Prefix Advertisement (UPA) routes propagated through BGP across AS boundaries.
    This solution extends the IGP-based UPA mechanism defined in RFC9929 to inter-
    domain scenarios, ensuring remote PEs can promptly detect and react to failures
    in source domains. The route is not used for packet forwarding but solely for
    BGP next-hop reachability resolution, enabling fast failover of BGP VPN routes.</p>"
