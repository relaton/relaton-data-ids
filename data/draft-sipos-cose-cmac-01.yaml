abstract:
- content: "<p>This document registers code points for using the Advanced Encryption
    Standard (AES) block cipher in Cipher-based Message Authentication Code (CMAC)
    mode within CBOR Object Signing and Encryption (COSE) messages. Specifically,
    these uses are for computing authentication tag values with no additional parameters.</p>"
