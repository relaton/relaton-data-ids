abstract:
- content: "<p>As the development of the AI technology, an AI Agent would be able
    to do some tasks as an assistant to human beings. During the task process, the
    Agent may need to connect to other Agents with different skills relative to the
    task. The Agent to Agent communication is a new kind of traffic for Internet,
    and some new requirements for networking are proposed. This document describes
    some routing considerations in the agentic network, especially for the cross-
    domain scenarios, in which the agentic network works as an overlay network above
    the IP network.</p>"
