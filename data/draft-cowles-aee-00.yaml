abstract:
- content: "<p>Agent Envelope Exchange (AEE) defines a minimal, transport- independent
    JSON envelope format for communication between autonomous AI agents, traditional
    services, and human participants. The envelope comprises 14 well-defined fields
    that provide message identity, typing, correlation, tracing, priority, and extensibility
    without prescribing payload semantics or transport mechanisms. AEE separates the
    concerns of message routing and lifecycle management (the envelope) from domain-specific
    meaning (intent schemas), enabling portable, composable, and auditable workflows
    across heterogeneous agent frameworks. This document specifies the envelope structure,
    validity rules, conformance levels, entity identifier conventions, a reserved
    intent namespace for protocol negotiation, and a referencing strategy that avoids
    envelope nesting.</p>"
