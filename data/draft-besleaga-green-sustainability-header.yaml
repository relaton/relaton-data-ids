abstract:
- content: "<p>This document defines the Sustainability HTTP response header field.
    This field provides a mechanism for servers to report the environmental impact
    and carbon footprint metrics associated with the processing and delivery of an
    HTTP request. By defining this header as a Structured Field, this specification
    ensures high parsing reliability and compatibility with HTTP/2 and HTTP/3 header
    compression mechanisms, thereby mitigating the secondary environmental costs of
    transmitting the metadata itself.</p>"
