abstract:
- content: "<p>This document updates [RFC3501] (IMAP4rev1) and [RFC9051] (IMAP4rev2)
    with persistent identifiers on mailboxes and messages to allow clients to more
    efficiently reuse cached data when resources have changed location on the server.
    This document obsoletes [RFC8474] by adding the OBJECTID+ extension, which introduces
    compound OBJECTID responses containing key-value pairs of identifiers and an ACCOUNTID
    identifier for account-level context. The OBJECTID+ extension is implicitly activated
    when a client uses any OBJECTID+-specific feature, ensuring backward compatibility
    with clients that do not understand the extension.</p>"
