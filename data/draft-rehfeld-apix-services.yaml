abstract:
- content: "<p>This document defines the APIX Services Profile: an extension to the
    APIX Core Infrastructure specification that enables discovery and automated verification
    of web API and bot-consumable services. It specifies the APM field set for API
    services, the APIX Spider verification protocol, liveness monitoring configuration,
    search and filter query semantics, and the service record schemas (Level 1 summary
    and Level 2 full record) returned to consuming agents. Autonomous agents that
    implement this profile can discover API services globally from a single entry
    point, evaluate their trust posture without any out-of-band knowledge, and select
    services that satisfy their own Trust Policy.</p>"
