abstract:
- content: <p>This document introduces IntelliNode, an in-network intelligent scheduling
    mechanism built upon the Computing-Aware Traffic Steering (CATS) framework. Modern
    large-scale AI training and inference heavily rely on distributed heterogeneous
    clusters (GPU/CPU/FPGA). However, existing networks lack awareness of tensor semantics,
    training phases, and heterogeneous computing capabilities, leading to high communication
    latency, low resource utilization, and pipeline stalls. IntelliNode shifts away
    from the traditional passive scheduling paradigms that rely on probes and controllers.
    By bypassing traditional paths and integrating FPGAs alongside programmable Switch
    ASICs, it constructs a rapid data-plane closed loop of "Perception- Inference-Decision-Execution".
    This architecture performs feature extraction at line rate, leverages lightweight
    prediction models to infer short-term network behavior, and drives real-time heuristic
    scheduling decisions (e.g., path selection, tensor slicing, and compute matching).
    This document defines the four core functional layers and extension signaling
    that support this architecture, laying the foundation for an AI-native, scalable
    distributed computing network.</p>
