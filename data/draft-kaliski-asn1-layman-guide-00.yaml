abstract:
- content: "<p>This note gives a layman's introduction to a subset of the Abstract
    Syntax Notation One (ASN.1), Basic Encoding Rules (BER), and Distinguished Encoding
    Rules (DER). The particular purpose of this note is to provide background material
    sufficient for understanding and implementing the RSA Data Security, Inc. Public
    Key Cryptography Standards (PKCS) family of standards. This document represents
    a republication of A Layman's Guide to a Subset of ASN.1, BER, and DER, originally
    authored and published by RSA Security USA LLC. This document is submitted with
    permission from, and on behalf of RSA Security USA LLC. By publishing this document,
    change control is transferred to the IETF and the Internet technical community
    in full conformance with the provisions of BCP 78 and BCP 79.</p>"
