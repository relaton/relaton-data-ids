abstract:
- content: "<p>This document defines an implementation profile for the System for
    Cross-domain Identity Management (SCIM) 2.0. The goal of this profile is to increase
    interoperability between identity providers and service providers by reducing
    the number of optional features and providing clear guidance on implementing a
    common subset of the SCIM standard. It deprecates certain features that have proven
    to be problematic for interoperability or are considered insecure.</p>"
