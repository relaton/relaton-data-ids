abstract:
- content: "<p>This document defines the APIX IoT Device Profile: an extension to
    the APIX Core Infrastructure specification that enables discovery and presence
    management for physical connected devices. It specifies the two-layer discoverability
    model (public device class, private device instance), the presence signal protocol,
    device instance token management, device class lifecycle, hub-mediated presence,
    ownership transfer, and the data retention and privacy rules applicable to device
    instance records. Autonomous agents that implement this profile can discover device
    capabilities at the class layer without any authentication, and retrieve live
    instance endpoint data at the instance layer subject to owner-granted authorisation.</p>"
