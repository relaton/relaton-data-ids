abstract:
- content: "<p>This document defines the Domain-Verified Skills (DVS) protocol, a
    lightweight mechanism for AI Agents to discover, verify, and execute skill definitions
    served over HTTPS. A skill is a directory containing a SKILL.md entry point and
    optional bundled resources that instructs an AI Agent to perform a specific task
    or adopt a specific behavior. The central design principle of DVS is that a skill's
    identity and trustworthiness are derived entirely from the HTTPS URL at which
    it is served -- no centralized registry or third-party certification is required.
    The operator of the URL's origin is the authoritative endorser of the skill. This
    trust is formalized through the concept of a Trust Root: an HTTPS URL prefix declared
    by the skill publisher that scopes the trust boundary for their skills. A skill
    is considered verified if and only if its URL begins with the declared Trust Root.
    For brands with first-party domains, the Trust Root is the domain origin. For
    brands publishing on user-generated content platforms where the platform operator
    does not vouch for individual publishers, the Trust Root MUST be path-scoped to
    content the brand controls, ensuring that trust does not extend to the entire
    platform. The protocol leverages the existing trust infrastructure of the Domain
    Name System (DNS) and Transport Layer Security (TLS) and is backward compatible
    with skills already served over HTTPS, including those hosted on GitHub or other
    platforms.</p>"
