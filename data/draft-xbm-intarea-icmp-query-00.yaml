abstract:
- content: "<p>This document introduces two new ICMP messages. They are called the
    ICMP Query Request and the ICMP Query Response. The ICMP Query Request requests
    information. The ICMP Query Response provides information in response to an ICMP
    Query Request. This document updates RFC 4884.</p>"
