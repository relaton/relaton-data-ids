abstract:
- content: <p>This document defines an alternative textual representation of IPv6
    addresses using Unicode Emoji characters (hereinafter "Smileys") in place of hexadecimal
    digits. The proposed format, known as EmojiNotation6 (EN6), aims to make IPv6
    addresses more expressive, more human-friendly, and significantly more fun at
    parties. Additionally, this document specifies a MANDATORY content- classification
    prefix using the AUBERGINE character (U+1F346) for addresses serving adult content,
    hereafter referred to as the "Eggplant Requirement".</p>
