abstract:
- content: "<p>IP Fast Reroute (IPFRR) [RFC5714] is widely deployed in IP networks
    to provide protection against failures by invoking locally determined repair paths.
    Traditional IPFRR deployments require the use of a link-state IGP to provide locally
    computed repair paths. This document provides the problem statement and outlines
    a solution to enable IPFRR computation and deployment in BGP-only networks. The
    solution maintains standard BGP routing operations while providing fast reroute
    capabilities comparable to IGP-based deployments.</p>"
