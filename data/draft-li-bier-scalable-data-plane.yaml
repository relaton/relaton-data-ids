abstract:
- content: "<p>This document describes an optimized data plane forwarding architecture
    for Bit Index Explicit Replication (BIER). The standard BIER forwarding procedures,
    as conceptually described in RFC 8279, imply a per-bit evaluation of the BitString
    against the Bit Index Forwarding Table (BIFT) on each Bit Forwarding Router (BFR).
    When the BitStringLength is large (e.g., 256 bits or more), this conceptual model
    presents implementation challenges for high-speed ASIC/NPU forwarding engines
    in terms of processing latency and hardware table resources. This document defines
    two conceptual data structures -- a Replication Member Table and an Interface
    BitMask Table -- that decouple the multicast replication decision from per-bit
    BitString parsing. The resulting forwarding pipeline operates in time proportional
    to the number of egress interfaces rather than the BitString length, enabling
    deterministic and scalable hardware processing. This mechanism is semantically
    equivalent to the forwarding procedures of RFC 8279 and does not modify the BIER
    encapsulation or introduce new protocol signaling.</p>"
