abstract:
- content: "<p>The Agent Transfer Protocol (AGTP) enables agents to communicate once
    they know each other's canonical identifiers. It does not define how agents find
    each other. This document specifies the AGTP Agent Discovery and Name Service
    (ANS): a protocol for dynamic agent discovery using the AGTP DISCOVER method and
    a governed Agent Name Service that returns ranked sets of Agent Manifest Documents
    matching a discovery query. ANS servers act as Scope-Enforcement Points for discovery
    queries and enforce behavioral trust score thresholds, trust tier requirements,
    and governance zone constraints. This document also defines the DISCOVER method,
    the Discovery Query language, and the Agent Name Service registration and lookup
    protocol.</p>"
