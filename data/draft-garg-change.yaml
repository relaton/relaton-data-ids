abstract:
- content: "<p>This document describes an Extensible Provisioning Protocol (EPP) mapping
    for provisioning and management of change request objects in a shared central
    repository, where a change request is one unit of work that is processed by submitting
    to a workflow to execute the linked EPP transform commands in order. The change
    request is a container with meta-data to ensure that the contained commands are
    processed as a group.</p>"
