abstract:
- content: "<p>This document specifies a method for utilizing the Domain Name System
    (DNS) to facilitate scalable and interoperable discovery between AI agents. The
    proposed mechanism, referred to as _DNS AI agent Discovery_ (DNS-AID), defines
    a structured DNS namespace and record usage model to support metadata exchange
    and capability advertisement. This will allow organisations to publish information
    about their AI agents on the Internet or internal networks using a well-known
    label within the organisation’s own DNS namespace. This document does not define
    how the published agent information is accessed or the exact structure of that
    information. Instead, it specifies a mechanism for indicating which access protocol
    should be used and what format the agent information will be provided in. _This
    document proposes no change to the structure of DNS messages, and no new operation
    codes, response codes, resource record types, or any other new DNS protocol values._</p>"
