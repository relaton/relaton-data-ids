abstract:
- content: "<p>This document proposes an extension to the Registration Data Access
    Protocol (RDAP) that enables the representation and exchange of structured reliability
    assessment metadata for registrars and domain names. The extension defines a structured
    assessment envelope through which any registry, registrar, or third-party assessor
    can expose assessment results in a common, machine-readable format within RDAP
    responses. The extension standardizes how assessment results are transported and
    referenced, not how they are computed. Scoring methodologies, thresholds, criteria,
    and governance frameworks are intentionally left to the operational and policy
    layer.</p>"
