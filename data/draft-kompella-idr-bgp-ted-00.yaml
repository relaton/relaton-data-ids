abstract:
- content: "<p>In some networking situations, most commonly in Data Centers, no IGP
    protocol is run. The preferred option is to run BGP to exchange reachability information.
    If it is also desirable to run Traffic Engineering, a Traffic Engineering Database
    is needed; this information is typically exchanged via IGP TE extensions. This
    memo proposes elements of BGP procedure to carry this information when there is
    no IGP.</p>"
