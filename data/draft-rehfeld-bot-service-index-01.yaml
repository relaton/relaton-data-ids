abstract:
- content: "<p>The internet was designed for human actors. Its discovery infrastructure
    — search engines, directories, and hyperlinked documents — assumes a human reading
    and navigating. Autonomous agents (bots) operating on the internet today face
    a structural gap: there is no machine-native, globally accessible index of services
    they can consume. This document proposes the *Bot Service Index (BSI)*: a HATEOAS-
    based, globally accessible, commercially sustainable service discovery infrastructure
    designed for autonomous agents as its primary consumers. The BSI provides a central,
    always-up-to-date, searchable index of machine-consumable API services, together
    with a structured three-dimensional trust model that allows consuming agents to
    apply their own trust policies against verifiable metadata.</p>"
