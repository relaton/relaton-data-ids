abstract:
- content: "<p>This document reserves codepoints in the EVPN Route Type registry for
    experimental use to enable implementations to carry out development and test of
    new EVPN features. It updates RFC7432 to modify the registration policy for the
    EVPN Route Type registry.</p>"
