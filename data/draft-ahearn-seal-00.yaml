abstract:
- content: "<p>This document defines the Signed Email Authentication Layer (SEAL),
    a cryptographically signed identity envelope carried within a new message header
    field, SEAL-Envelope. SEAL provides a stable, forwarding-resilient identity assertion
    that is independent of the mutable RFC 5322 header block and message body. SEAL
    is designed to complement or replace DKIM and ARC by eliminating their dependency
    on mutable message components and by providing a canonical, tamper- evident identity
    layer that survives transit through intermediaries.</p>"
