abstract:
- content: "<p>X.509 certificates ([RFC5280]) defines the Extended Key Usage (EKU)
    extension and specifies several key purpose identifiers (KeyPurposeIds) for use
    with that extension. This document defines a KeyPurposeId for the purpose of signing
    Evidence to provide remote attestation functions as defined in the RATS Architecture
    ([RFC9334]).</p>"
