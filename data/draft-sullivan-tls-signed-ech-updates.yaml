abstract:
- content: "<p>Encrypted ClientHello (ECH) requires clients to have the server's ECH
    configuration before connecting. Currently, when ECH fails, servers can send updated
    configurations but clients cannot authenticate them unless the server has a valid
    certificate for the public name, limiting deployment flexibility. This document
    specifies a new mechanism for authenticating ECH configurations. Servers include
    additional information in their initial ECH configurations, which enables clients
    to authenticate updated configurations without relying on a valid certificate
    for the public name.</p>"
