abstract:
- content: "<p>This document describes guidelines for entities that wish to publish
    a list of URLs from where the contents of the IANA DNS root zone may be obtained.
    These guidelines are specifically provided as guidance to IANA, but these suggestions
    may be applicable to any entity wishing to build a list of IANA DNS root zone
    sources for their own purposes.</p>"
