abstract:
- content: "<p>Transaction Tokens (Txn-Tokens) are designed to maintain and propagate
    user identity, workload identity and authorization context throughout the Call
    Chain within a trusted domain during the processing of external requests (e.g.
    such as API calls) or requests initiated internally within the trust domain. Txn-Tokens
    ensure that this context is preserved throughout the Call Chain thereby enhancing
    security and consistency in complex, multi-service architectures.</p>"
