abstract:
- content: "<p>In Situ Operations, Administration, and Maintenance (IOAM) records
    operational (including telemetry) information in packets while they traverse a
    path in the network. RFC 9197 specifies data fields for IOAM (a.k.a IOAM-Data-Fields)
    and associated data types. This document specifies integrity protection of IOAM-Data-Fields
    for Intra-IOAM-Domain use cases.</p>"
