abstract:
- content: "<p>FrodoKEM is an unstructured lattice based Key Encapsulation Mechanism
    (KEM). Compared to ML-KEM, it is considered with more conservative security. This
    draft specifies how to use FrodoKEM by itself or as an additional key exchange
    in IKEv2 along with a traditional key exchange. These options enable to negotiate
    IKE and Child SA keys that are safe against a Cryptographically Relevant Quantum
    Computer (CRQC).</p>"
