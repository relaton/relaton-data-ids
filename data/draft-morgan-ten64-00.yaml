abstract:
- content: "<p>Ten64 is a positional numeral system for representing numeric values
    with an alphabet of 64 characters (aka. radix/base 64). However, unlike most positional
    number systems, the characters are written in ascending (aka. big-endian, network-order)
    and NOT descending order. The main differences are the use of sextets (six bits)
    instead of octets (aka. bytes). Similar to hexadecimal, Ten64 can be used to create
    binary strings of arbitrary length. Ten64 can encode one or more Modern Western
    Numbers (aka. Arabic, Vedic), interpreting the characters respective composite
    big-endian binary as a one or more Modern Western Numbers. The motivation for
    Ten64 is to encode numbers in a compact and human- readable format similar to
    Base58. However, Ten64 is designed to be optimized for use with numbers commonly
    used in identifiers, such as DIDs, DOIDs, IANA OIDs, UUIDs, dates, time(stamp)s,
    points, and more. Unlike Base58, and more like hexadecimal Ten64 aligns the Modern
    Western Numerals with the respective big-ending binary (i.e.; 0 → 0, 1 → 1, 2
    → 11, etc). Finally, Ten64 provides a disk-based number encoding system for huge
    numbers and number streams.</p>"
