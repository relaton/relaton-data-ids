abstract:
- content: "<p>This document defines an Authentication and Key Agreement (AKA) authentication
    method for the Ephemeral Diffie-Hellman Over COSE (EDHOC) key exchange protocol.
    This method, named EDHOC-AKA, is designed as a specific profile of the EDHOC Pre-Shared
    Key (PSK) authentication method defined in [draft-ietf-lake-edhoc-psk-06]. EDHOC-AKA
    leverages the 3GPP AKA protocol to dynamically generate a session-specific Pre-Shared
    Key, which is then used to run the EDHOC- PSK protocol flow. The AKA-specific
    parameters are transported within the External Authorization Data (EAD) fields
    of the EDHOC messages. This approach provides efficient mobile communication network
    access authentication for resource-constrained scenarios (such as Non-Terrestrial
    Networks, NTN) while inheriting the security properties of EDHOC-PSK, including
    mutual authentication, identity protection, and forward secrecy.</p>"
