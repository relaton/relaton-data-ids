abstract:
- content: "<p>This document defines a cryptographic attestation framework for the
    complete lifecycle of artificial intelligence models, from training data provenance
    through model weight signing, quantization verification, deployment attestation,
    and per- inference output signing. The framework creates an unbroken chain of
    cryptographic evidence binding each inference output to the specific model version,
    training data, and deployment configuration that produced it. The framework uses
    ECDSA P-256 digital signatures, SHA-256 hash functions, Merkle trees for corpus
    attestation, and JSON Web Key Sets (JWKS) for key discovery. It addresses documented
    threats including model distillation attacks, quantization poisoning, training
    data manipulation, silent model degradation, and inference output tampering. This
    specification complements the Agent Trust Transport Protocol (ATTP) [draft-sharif-attp-agent-trust-transport],
    MCPS message signing [draft-sharif-mcps-secure-mcp], and the Agent Audit Trail
    format [draft-sharif-agent-audit-trail] to provide end-to- end cryptographic verification
    from data ingestion to consumer delivery.</p>"
