abstract:
- content: "<p>This document proposes enhancements to TLS-based EAP methods, including
    the Extensible Authentication Protocol with Transport Layer Security (EAP-TLS),
    EAP Tunneled TLS (EAP-TTLS), Protected EAP (PEAP), and EAP Tunnel Method (TEAP),
    to incorporate post-quantum cryptographic mechanisms. It also addresses challenges
    related to large certificate sizes and long certificate chains, as identified
    in [RFC9191], and provides recommendations for integrating PQC algorithms into
    TLS-based EAP deployments.</p>"
