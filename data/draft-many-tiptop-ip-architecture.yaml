abstract:
- content: "<p>The IP protocol stacks used on Earth's Internet are typically configured
    based on assumptions of short delays and mostly uninterrupted communications.
    This document describes an architecture of the IP protocol stack tailored for
    its use in deep space. It involves buffering IP packets in IP forwarders facing
    intermittent links and adjusting transport protocol configurations and application
    protocol timers. This architecture applies to the Moon, Mars, and general interplanetary
    networking.</p>"
