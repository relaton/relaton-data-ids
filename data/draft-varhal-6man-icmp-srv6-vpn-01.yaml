abstract:
- content: "<p>This document specifies ICMP error handling in SRv6-based Virtual Private
    Networks, that support direct localization of failures. It provides a solution
    for connectivity check and fault localization without adding complexity to P nodes
    and keeps P nodes service agnostic. ICMP processing is changed only on ingress
    PE nodes and gains from adding VPN-specific information to the SRv6 encapsulated
    packet. Egress PE nodes are not involved in the forwarding of the ICMP error messages.
    Therefore, the solution provides visibility upto the failure even if ingress PE
    to egress PE connectivity is broken within the SR domain.</p>"
