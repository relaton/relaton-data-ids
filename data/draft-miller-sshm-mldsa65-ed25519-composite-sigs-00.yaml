abstract:
- content: "<p>This document specifies the integration of the MLDSA65-Ed25519-SHA512
    composite signature scheme into the Secure Shell (SSH) protocol. This scheme combines
    the post-quantum Module-Lattice Digital Signature Algorithm (ML-DSA) with the
    classical elliptic curve Ed25519 signature algorithm to provide security against
    both quantum and classical adversaries.</p>"
