abstract:
- content: "<p>With the advancement of AI technologies, AI Agent traffic will account
    for the majority of network traffic, driving an increasing demand for higher quality
    of multi-modal data transmissions. Current networks lack awareness of the diverse
    transmission quality requirements for multi-modal data within a single traffic,
    leading to degraded service quality and inefficient utilization of network resources.
    This document proposes methods to enable networks (e.g., mobile network, transport
    network) to recognize the characteristics and the transmission requirement of
    AI Agent multi-modal data and outlines necessary capabilities and features of
    the AI Agent Protocols.</p>"
