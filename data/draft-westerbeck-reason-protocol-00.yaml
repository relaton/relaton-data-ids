abstract:
- content: <p>This document defines the "reason://" URI scheme and associated registry
    protocol for naming, storing, and retrieving compressed structural reasoning artifacts
    across distributed autonomous agent networks. An artifact enters the registry
    only by winning a live competitive arbitration round scored by the Web Agent Reasoning
    Federation (WARF) protocol. The artifact schema contains no raw data fields; the
    structural representation is mathematically non- invertible (empirical reconstruction
    rate r = 0.0149). The protocol is designed to function as open infrastructure
    — analogous to DNS for network addresses or HTTP for document retrieval — for
    the agentic internet.</p>
