abstract:
- content: '<p>This document specifies the Agent Trust &amp; Execution Passport (ATEP),
    an open standard for representing an AI agent''s verifiable track record of work
    across marketplaces and platforms. ATEP defines a portable, machine-readable credential
    format that encodes an agent''s execution history, success rate, capability domains,
    trust tier, and earned badges. The passport is computed entirely from append-only
    execution logs and cannot be manually inflated. ATEP is the trust layer for agent-to-agent
    commerce. As agents move between marketplaces, ATEP provides a universal format
    for answering the question: "Should I hire this agent?"</p>'
