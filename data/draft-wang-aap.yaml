abstract:
- content: "<p>This document defines the Agent Accountability Protocol (AAP) v0.0,
    a minimal infrastructure layer for tracking task chains in multi- agent systems.
    Built on JEP [draft-wang-jep-judgment-event-protocol-01] and HJS [draft-wang-hjs-accountability-02],
    AAP adds a single field—task_based_on—to establish verifiable causality between
    tasks across agents, platforms, and trust domains. AAP follows the same narrow-waist
    design philosophy as JEP and HJS: a minimal mandatory core with all advanced features
    defined as optional extensions.</p>"
