abstract:
- content: "<p>When deciding to migrate a network from existing data-plane technologies
    (e.g. MPLS, SR-MPLS or overlay encapsulations such as VXLAN) to SRv6, common questions
    involve how to perform the migration, how to minimize impact to the existing network
    and what techniques are available to support a smooth transition. This document
    presents various deployment and migration options for networks evolving toward
    SRv6 from prior transport or overlay technologies.</p>"
