abstract:
- content: "<p>This document defines a vCon extension for representing Morse code
    conversations within the Virtualized Conversation (vCon) container format. Morse
    code remains an actively used communication medium among amateur radio operators,
    in historical preservation contexts, and in cultural works. The extension provides
    standardized encoding for Morse code dialog, including keying timing data, prosign
    representation, and the Farnsworth timing method. This document also addresses
    information-theoretic considerations of Morse code's variable-length encoding,
    its relationship to modern source coding theory, and the privacy implications
    of preserving historically significant Morse code conversations whose data subjects
    may be deceased.</p>"
