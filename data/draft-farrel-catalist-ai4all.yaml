abstract:
- content: "<p>Over recent years we have seen the emergence of Artificial Intelligence
    (AI) systems as tools that can contribute to the specification, implementation,
    and operation of Internet technologies. This document examines the potential for
    making increased use of Machine Learning (ML) in the scope of the IETF.</p>"
