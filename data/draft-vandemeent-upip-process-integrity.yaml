abstract:
- content: "<p>This document specifies UPIP (Universal Process Integrity Protocol),
    a five-layer protocol for capturing, verifying, and reproducing computational
    processes across machines, actors, and trust domains. UPIP defines a cryptographic
    hash chain over five layers: STATE, DEPS, PROCESS, RESULT, and VERIFY, enabling
    any party to prove that a process was executed faithfully and can be reproduced.
    This document also specifies Fork Tokens, a continuation protocol enabling multi-actor
    process handoff with cryptographic chain of custody. Fork tokens freeze the complete
    UPIP stack state and transfer it to another actor (human, AI, or machine) for
    continuation, maintaining provenance integrity across the handoff boundary. Together,
    UPIP and Fork Tokens address process integrity in multi- agent AI systems, distributed
    computing, scientific reproducibility, autonomous vehicle coordination, and regulatory
    compliance scenarios.</p>"
