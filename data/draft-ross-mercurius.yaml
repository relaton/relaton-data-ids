abstract:
- content: "<p>The Mercurius Window System (MWS) is a network‑native, server‑side
    rendering system that enables graphical sessions to be accessed remotely with
    explicit semantics for windows, input, audio, and session state. MWS allows a
    user to interact with a workstation from untrusted or resource‑constrained client
    devices without exposing application data, GPU workloads, or compositor state
    to those devices. The protocol defines a zero‑trust client model, a structured
    session and window architecture, and distinct planes for rendering, video, audio,
    and input over an SCTP multi‑stream transport profile. This document specifies
    the MWS architecture, message formats, transport requirements, and security model.</p>"
