title:
- content: Performance Measurement with Asymmetrical Traffic Using Simple Two-Way
    Active Measurement Protocol (STAMP)
  language:
  - en
  script:
  - Latn
  format: text/plain
docid:
- id: draft-ietf-ippm-asymmetrical-pkts
  type: Internet-Draft
  primary: true
abstract:
- content: "<p>This document defines an optional extension to the Simple Two-Way Active
    Measurement Protocol (STAMP) that enables a Session-Reflector to send asymmetrical
    packets, that is, response packets whose size or quantity differs from those sent
    by the Session-Sender. While standard STAMP exchanges are symmetrical, certain
    measurement scenarios benefit from reflected packets of different lengths or additional
    responses to better approximate application traffic conditions. The extension
    specifies the Reflected Test Packet Control TLV and associated procedures, analyzes
    challenges in active performance measurement (including in multicast environments),
    and describes STAMP behaviors to improve measurement efficiency and reduce network
    impact.</p>"
  language:
  - en
  script:
