abstract:
- content: "<p>This document defines the Open Contributions Descriptor (OCD), a JSON
    format for publishing machine-readable metadata about an organization's participation
    in the open ecosystem. OCD allows organizations to publish a single discovery
    document describing open source projects, open data publications, open standards
    participation, contact information, governance material, and declared relationships
    to external organizations and projects. OCD is intended to be published at a predictable
    well-known location to support automated discovery, indexing, and ecosystem analysis.</p>"
