abstract:
- content: "<p>This document defines a YANG data model to report an ISAC Utilization
    Score (US) in Integrated Sensing and Communication (ISAC) systems. The US is an
    abstract, normalized score (0..100) that summarizes the relative resource cost
    of executing a sensing operation on a device. The model supports a mandatory overall
    US and optional explanatory component impact scores (compute, memory, energy,
    storage, latency). The model also supports optional metadata (e.g., timestamp,
    aggregation window, and scoring method identification) describing how a reported
    score was derived. This revision aligns terminology and leaf names to reduce ambiguity
    between normalized impact scores and raw resource telemetry, removes per-measurement-related
    objects to keep the model focused on an overall score, and specifies a companion
    augmentation module (Path 1) that attaches ISAC utilization telemetry to a GREEN
    Energy Object (as defined by the GREEN Power and Energy YANG Module) for correlation
    with power/energy telemetry.</p>"
