abstract:
- content: <p>This document defines new ICMP and ICMPv6 error codes to send error
    messages to the source device when forwarding Ping or Traceroute packets is dropped
    due to SAVNET validation failure. The error message explicitly states the reason
    for dropping as "SAVNET Validation Failed," thereby enhancing network observability
    and troubleshooting capabilities.</p>
