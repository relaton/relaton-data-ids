abstract:
- content: "<p>*NOTE: This document describes a signature scheme based on an algorithm
    currently under evaluation in the NIST Post-Quantum Cryptography standardization
    process. Be aware that the underlying primitive may change as a result of that
    process.* This document specifies the algorithm encodings and representations
    for the SQIsign digital signature scheme within the CBOR Object Signing and Encryption
    (COSE) and JSON Object Signing and Encryption (JOSE) frameworks. SQIsign is an
    isogeny-based post-quantum signature scheme that provides the most compact signature
    and public key sizes of any candidate in the NIST Post-Quantum Cryptography (PQC)
    standardization and on-ramp-to-standardization processes. The standardization
    of SQIsign is critical to addressing immediate infrastructure bottlenecks, specifically
    the FIDO2 CTAP2 specification used by an estimated 6.25 billion in-service devices
    and browser installations. CTAP2 enforces a 1024-byte default limit for external
    key communication. Most standardized post-quantum signatures exceed this limit,
    so cannot easily be deployed in these ecosystems without prohibitive protocol
    renegotiation, complex message fragmentation or hardware replacement. SQIsign-L1
    signatures are small enough to enable delivery over highly constrained networks
    like 802.15.4 with minimal fragmentation. This document clarifies that SQIsign's
    security relies on the general supersingular isogeny problem and is fundamentally
    unaffected by the torsion-point attacks that deprecated the SIDH/SIKE key exchange.
    By establishing stable COSE and JOSE identifiers, this document ensures the interoperability
    required for the seamless integration of post- quantum security into high-density,
    bandwidth-constrained, and legacy-compatible hardware environments.</p>"
