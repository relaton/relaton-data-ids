abstract:
- content: "<p>Composite ML-KEM defines combinations of ML-KEM with RSA-OAEP, ECDH,
    X25519, and X448. This document specifies the conventions for using Composite
    ML-KEM algorithms with the Cryptographic Message Syntax (CMS) using the KEMRecipientInfo
    structure defined in “Using Key Encapsulation Mechanism (KEM) Algorithms in the
    Cryptographic Message Syntax (CMS)” (RFC 9629).</p>"
