abstract:
- content: "<p>This document specifies the did:drn Decentralized Identifier (DID)
    method, which defines a deterministic mapping from Uniform Resource Names (URNs)
    (RFC 8141) into a DID-compatible identifier format called a Decentralized Resource
    Name (DRN). The did:drn method preserves URN semantics, enables DID resolution
    without mandatory centralized infrastructure, and provides optional cryptographic
    and service-layer extensibility. The method is fully compatible with the W3C DID
    Core specification (W3C DID Core, 2022) and the broader DID ecosystem.</p>"
