abstract:
- content: "<p>This document defines a benchmarking methodology for routers that implement
    ROV. The methodology focuses on device-level behavior, including processing of
    validated ROA payload (VRP) updates, the interaction between ROV and BGP, control-plane
    resource utilization, and the scalability of ROV under varying operational conditions.
    The procedures described here follow the principles and constraints of the Benchmarking
    Methodology Working Group (BMWG) and are intended to produce repeatable and comparable
    results across implementations.</p>"
