abstract:
- content: "<p>SAFE defines an encryption envelope that encrypts a payload once for
    multiple recipients. Decryption can require multiple credentials in sequence (public
    keys, passphrases, or other registered methods), so no single factor suffices.
    The format is designed for large, writable files: it supports streaming decryption,
    random-access reads at block granularity, and selective re-encryption of modified
    blocks without re-keying. Recipient privacy modes allow locks to omit identifying
    metadata. SAFE accommodates post-quantum key encapsulation without format changes,
    provides algorithm agility through IANA registries, and defines a mandatory-to-implement
    profile for interoperability.</p>"
