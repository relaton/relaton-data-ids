abstract:
- content: "<p>In order to reduce the size of SRv6 SID, NEXT-CSID and REPLACE-CSID
    flavors for SRv6 endpoint behaviors are proposed. Similar to PSP and USD, NEXT-CSID
    and REPLACE-CSID can be combined just like PSP &amp; USD. This document defines
    the combined NEXT&amp;REPLACE-CSID flavor, which can provide more efficient compression
    for SRv6 Segment-List encoding in the Segment Routing Header (SRH).</p>"
