abstract:
- content: "<p>This document describes how PIM Sparse-Mode can be used to construct
    IPv4 multicast trees across an IPv6-only network core. It specifies the use of
    IPv6 PIM messages to carry IPv4 group and source addresses, the use of RPF vectors
    for reachability, and a new Hello Option to signal support for this capability.</p>"
