abstract:
- content: "<p>This document defines a congestion-aware adaptive flow table switching
    mechanism for Equal-Cost Multi-Path (ECMP) routing. The mechanism periodically
    assesses the congestion state of egress ports and progressively adjusts flow table
    mappings based on quantified congestion levels. This addresses the port congestion
    issues that occur in traditional ECMP load balancing when traffic patterns change
    suddenly or multicast traffic is present, while maintaining packet ordering within
    flows.</p>"
