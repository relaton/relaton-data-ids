abstract:
- content: "<p>This document defines a PROBE extension for MoQ Transport [moqt]. A
    subscriber opens a bidirectional PROBE stream to request that the publisher pad
    the connection up to a target bitrate. The publisher sends padding as defined
    in [moqt] Section 7.7 and periodically responds with the measured bitrate and
    an elapsed timestamp, enabling the subscriber to estimate the available bandwidth.</p>"
