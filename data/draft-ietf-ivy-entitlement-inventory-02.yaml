abstract:
- content: "<p>This document defines a YANG data model for managing software-based
    entitlements (licenses, authorization tokens, pay-as-you-go service credentials…)
    within a network inventory. The model represents the relationship between organizational
    entitlements, network element capabilities, and the constraints that entitlements
    impose on capability usage. This data model enables operators to determine what
    capabilities their network elements possess, which capabilities are currently
    entitled for use, and what restrictions apply. The model supports both centralized
    entitlement management and device-local entitlement tracking for physical and
    virtual network elements.</p>"
