abstract:
- content: "<p>This document defines the Verified Email Identity Framework (VEIF),
    a mechanism for associating a cryptographically verifiable real- world identity
    with an email message. VEIF complements existing email authentication technologies
    such as SPF, DKIM, and DMARC by providing a higher-level identity assurance layer.</p>"
