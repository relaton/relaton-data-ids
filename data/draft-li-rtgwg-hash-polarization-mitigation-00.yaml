abstract:
- content: "<p>This document defines a hash polarization mitigation extension for
    Link Aggregation (LAG) and Equal-Cost Multi-Path (ECMP) routing. This document
    specifies hash input field selection rules, Shift Factor definition and generation
    methods, hash value adjustment algorithms, and normative requirements for device
    processing procedures.</p>"
