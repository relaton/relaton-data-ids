abstract:
- content: "<p>This document defines version 01 of the Reilly Banking Integrity Protocol
    (RBIP), a compliance-grade architecture for generating immutable, auditor- and
    regulator-verifiable evidence trails in banking operations. RBIP combines cryptographic
    anchoring (via blockchain timestamping) with archival DOI issuance to produce
    permanent, tamper-evident records across three core domains: Proof-of-Reserves
    &amp; Liquidity (PRL), Loan Origination &amp; Collateral Chain (LOC), and KYC/AML
    Evidence Ledger (KAL). RBIP is designed to help financial institutions satisfy
    requirements from Basel III/IV, SOX, BSA/AML, DORA, MiCA, ISO/IEC 42001:2023,
    and other applicable regulations while preserving privacy, accountability, and
    auditability. This document and its foundational specification are protected under
    triple-layer digital permanence: (1) DOI archival via a persistent archival provider
    (DOI: 10.5281/zenodo.17114424, published September 13, 2025, initially archived
    at Zenodo); (2) blockchain timestamping via a public proof-of-work blockchain
    timestamping service (initially anchored via OpenTimestamps to the Bitcoin blockchain);
    and (3) IETF Internet-Draft submission (draft-reilly-banking-integrity-00, submitted
    September 27, 2025). This triple-layer permanence establishes cryptographically
    verifiable prior art with an immutable public timestamp predating any subsequent
    implementation, derivative work, or regulatory mandate.</p>"
