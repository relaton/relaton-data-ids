abstract:
- content: "<p>This document describes concepts related to provisioning MoQ relay
    scopes on CDN infrastructure, including scope creation, credential- to-scope mapping,
    and origin fallback configuration. It uses a provisioning API as a vehicle for
    describing these concepts and identifying areas where common semantics across
    CDN providers may be needed for multi-CDN compatibility.</p>"
