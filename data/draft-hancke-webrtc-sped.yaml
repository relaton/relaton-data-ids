abstract:
- content: "<p>WebRTC setup normally serializes ICE and DTLS, adding at least one
    extra round trip before secure media can flow. This document defines the STUN
    Protocol for Embedding DTLS (SPED), which carries DTLS handshake data and acknowledgements
    inside STUN Binding Requests and Responses. SPED allows ICE and DTLS to proceed
    in parallel, improves setup behavior under loss, and remains backward compatible
    with existing ICE processing.</p>"
