abstract:
- content: "<p>Interacting entities such as agents, tasks, users, workloads, data,
    compute, etc., in AI ecosystem/network are proliferating, yet there is no standardised
    way to discover what entities exist, what attributes such as skills, capabilities,
    physical characteristics, etc., they posses, what services they offer, or how
    to reach them across organisational boundaries. Discovery today relies on proprietary
    directories or manual configuration, creating fragmented ecosystems that prevent
    cross- domain collaboration. This document describes the problem space that motivates
    Discovery of Agents, Workloads, and Named Entities (DAWN). It clarifies the scope
    of work within entity ecosystems, identifies why current approaches are insufficient,
    and outlines the challenges a standardised discovery mechanism must address. It
    does not propose a specific solution or protocol.</p>"
