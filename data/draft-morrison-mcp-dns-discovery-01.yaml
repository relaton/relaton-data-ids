abstract:
- content: "<p>This document defines a DNS-based mechanism for the discovery of Model
    Context Protocol (MCP) servers. A TXT resource record published at the underscore-prefixed
    label _mcp.&lt;domain&gt; advertises the presence, endpoint URL, transport protocol,
    cryptographic identity, and capability profile of an MCP server associated with
    a domain name. The mechanism complements existing HTTPS-based discovery (.well-known/mcp/server-card.json)
    by providing a lightweight, resolver-cached bootstrap that requires no HTTPS round-
    trip. The design follows the precedent established by DKIM [RFC6376], SPF [RFC7208],
    DMARC [RFC7489], and MTA-STS [RFC8461], all of which use DNS TXT records at underscore-prefixed
    labels to advertise domain-scoped policy and service metadata.</p>"
