abstract:
- content: "<p>This document specifies DNS-Native Agent Naming and Resolution (DN-
    ANR) for AI agents. DN-ANR has three goals: (1) use domain names (FQDNs) as stable
    Agent Identifiers, (2) resolve Agent Identifiers to verifiable endpoints and supported
    protocol/version information with a cryptographic integrity chain (DNSSEC preferred),
    and (3) provide only minimal and stable pointer/index capabilities that can be
    referenced by upper-layer discovery systems. DN-ANR intentionally does not carry
    heavy semantic metadata in DNS, and does not define semantic discovery, ranking,
    or routing decisions.</p>"
