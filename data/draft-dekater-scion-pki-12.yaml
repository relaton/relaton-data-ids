abstract:
- content: "<p>This document presents the trust concept and design of the SCION _Control
    Plane Public Key Infrastructure (CP-PKI)_. SCION (Scalability, Control, and Isolation
    On Next-generation networks) is a path-aware, inter-domain network architecture
    that relies on the CP-PKI to handle cryptographic material, authenticate control
    plane messages used to securely disseminate path information. This specification
    introduces its localized trust model, anchored in Isolation Domains (ISDs). It
    defines the distinct certificate types, and specifies the structure, format and
    lifecycle of the Trust Root Configuration (TRC). Furthermore, it provides practical
    guidelines for deploying and maintaining the CP-PKI infrastructure. This document
    contains new approaches to secure path aware networking. It is not an Internet
    Standard, has not received any formal review of the IETF, nor was the work developed
    through the rough consensus process. The approaches offered in this work are offered
    to the community for its consideration in the further evolution of the Internet.</p>"
