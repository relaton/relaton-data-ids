abstract:
- content: "<p>This document specifies the StealthFlow Protocol (SFP), a pre-transport
    security layer designed to operate before TLS or QUIC. SFP introduces a zero-handshake
    mechanism with reduced observability and asymmetric cost properties to mitigate
    denial-of-service attacks and traffic analysis, while remaining compatible with
    existing PKI infrastructure.</p>"
