  type: Internet-Draft
  primary: true
abstract:
- content: "<p>This document defines an extension to the Border Gateway Protocol (BGP)
    Flow Specification (FlowSpec) to enable filtering based on the Origin Autonomous
    System (AS) of the destination IP address. This extension is particularly useful
    in mitigating Distributed Denial of Service (DDoS) attacks where the target IP
    addresses are dynamic but belong to a specific destination AS.</p>"
  language:
  - en
  script:
  - Latn
  format: text/html
