abstract:
- content: "<p>This document specifies a mechanism for serving content, such as HTML
    or JSON, directly via DNS TXT records. This feature is intended as a fallback
    mechanism when a primary service (A/AAAA record) is unreachable, or as a lightweight
    hosting solution for parked domains to display landing pages without requiring
    active HTTP servers or individual SSL certificates. Trust is established via DNSSEC,
    allowing browsers to treat the content as secure.</p>"
