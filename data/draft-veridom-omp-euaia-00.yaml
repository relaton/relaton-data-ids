abstract:
- content: '<p>This document defines a domain profile of the Operating Model Protocol
    (OMP) for high-risk AI system operators subject to Article 12 of Regulation (EU)
    2024/1689 (the EU AI Act). Article 12 requires that high-risk AI systems automatically
    generate tamper- resistant logs capable of ensuring traceability throughout the
    system''s lifetime. This profile specifies how OMP''s deterministic routing invariant,
    Watchtower enforcement framework, and three-layer cryptographic integrity architecture
    (SHA-256, RFC 3161, institution signature) satisfy the Article 12 requirements,
    and defines the domain-specific Watchtower configurations and Audit Trace schema
    extensions applicable to EU high-risk AI deployments under Annex III of the Regulation.
    The core OMP specification is defined in a separate Internet-Draft (\"Operating
    Model Protocol (OMP): A Deterministic Decision-Enforcement Protocol with Externalized
    Proof-of-Integrity\").</p>'
