abstract:
- content: "<p>This document specifies the COGITATOR Witness Protocol -- a scheme
    for producing cryptographically verifiable, tamper-evident records of AI agent
    execution. A conforming implementation produces a single witness root value that
    any third party can independently recompute from the same inputs to verify the
    record was not altered after the fact. The protocol is implementation-agnostic.
    The reference implementation is COGITATOR (Rust), but any language or framework
    can produce conforming witness bundles. This document also describes how the COGITATOR
    Witness Protocol relates to the IETF SCITT architecture, with which it is designed
    to be used as a payload inside SCITT Signed Statements.</p>"
