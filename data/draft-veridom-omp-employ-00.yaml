abstract:
- content: "<p>This document defines a domain profile of the Operating Model Protocol
    (OMP) for automated decision systems (ADS) deployed in employment contexts subject
    to the California Civil Rights Council (CRC) Employment Regulations on Automated
    Decision Systems (effective October 1, 2025), New York City Local Law 144 (bias
    audit requirement for automated employment decision tools), the Illinois Artificial
    Intelligence Video Interview Act (AIVIA), and related US state and municipal ADS
    accountability obligations in employment. The profile -- designated WorkMark --
    specifies how OMP's deterministic routing invariant, Watchtower enforcement framework,
    and three-layer cryptographic integrity architecture satisfy the record-retention,
    named accountability, bias audit evidence, and per- decision auditability requirements
    applicable to employment ADS deployments. The profile directly addresses the California
    CRC requirement to retain ADS inputs, outputs, decision criteria, and audit results
    for four years with named accountability for AI- assisted hiring and employment
    decisions. The OMP core specification is defined in the Operating Model Protocol
    Internet-Draft (draft-veridom-omp).</p>"
