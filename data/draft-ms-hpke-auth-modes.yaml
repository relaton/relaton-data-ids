abstract:
- content: "<p>The standards-track [I-D.ietf-hpke-hpke] supersedes the informational
    [RFC9180], omitting its authenticated modes mode_auth and mode_auth_psk. This
    document restores those two modes as a strict extension, requiring only the addition
    of AuthEncap()/AuthDecap() to the DHKEM, the definition of four setup functions,
    and a change in VerifyPSKInputs(). The extension does not alter the externally
    observable behavior of the existing HPKE modes standardized in [I-D.ietf-hpke-hpke].
    This document also illustrates, informatively, how the restored modes can be used.
    One such application uses mode_auth_psk with a post- quantum KEM (PQ-KEM) shared
    secret as the PSK, providing hybrid PQ/T confidentiality. This material is provided
    to motivate the extension and may be developed as separate work.</p>"
