abstract:
- content: "<p>This document introduces RSVP-TE signaling procedures that enable the
    head-end Label Switched Router (LSR) of a local-protection-desiring Label Switched
    Path (LSP) to influence the optimization objective and bounded metric constraints
    used for the path computation of a backup LSP tunnel at a Point of Local Repair
    (PLR).</p>"
