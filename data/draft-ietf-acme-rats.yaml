abstract:
- content: "<p>This document describes an approach where an ACME Server can challenge
    an ACME Client to provide Evidence, Endorsements, or Attestation Result according
    to the Remote ATtestation procedureS (RATS) framework in any format supported
    by the Conceptual Message Wrapper (CMW). The ACME Server can optionally challenge
    the Client for specific claims that it wishes attestation for.</p>"
