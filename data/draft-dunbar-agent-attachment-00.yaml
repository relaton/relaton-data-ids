abstract:
- content: "<p>This document describes the Agent Attachment Protocol (AAP), a network-centric
    mechanism that enables autonomous agents to securely attach to an overlay network
    infrastructure. The protocol defines procedures for agent attachment, identity
    validation, capability exchange, and secure session establishment between an agent
    and its local network edge node. Once attached, agents can communicate with remote
    agents through the overlay formed by interconnected edge nodes, without exposing
    the underlying network topology.</p>"
