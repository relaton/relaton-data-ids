abstract:
- content: "<p>The proliferation of distributed systems, Artificial Intelligence (AI)
    agents, cloud workloads, and network services has created a need for interoperable
    mechanisms to discover entities. Entities may include AI agents, software services,
    compute workloads, and other named resources that need to be found and characterised
    before interaction can begin. This document defines terminology for Discovery
    of Agents, Workloads, and Named Entities (DAWN). The intention is that this common
    set of terms can be used by other documents related to DAWN and so achieve consistency
    of meaning across the space.</p>"
