abstract:
- content: "<p>This document specifies ATTP (Agent Trust Transport Protocol), a synchronous
    request-response protocol for communication between autonomous AI agents and web
    API servers. ATTP operates as an application-layer protocol over HTTP, adding
    mandatory cryptographic identity verification, per-message signing, trust-gated
    access control, and tamper-evident audit trail generation to every agent-server
    interaction. ATTP defines five protocol-layer headers for requests (X-Agent-Trust,
    X-Agent-Signature, X-Agent-Nonce, X-Agent-Timestamp, X-ATTP-Version) and three
    for responses (X-Server-Signature, X-Server-Nonce, X-Server-Timestamp) that carry
    an Agent Passport (JWT-based identity credential), ECDSA P-256 digital signatures,
    cryptographic nonces, and timestamps. Server middleware verifies all cryptographic
    properties before application code executes. ATTP has no insecure mode. Every
    request MUST carry a valid Agent Passport. Every request body MUST be signed.
    Every response body MUST be signed. Every interaction MUST be recorded in a hash-chained
    audit trail. The protocol defines a URL scheme (attp://) and is fully backward-compatible
    with existing HTTP infrastructure. ATTP is the synchronous counterpart to the
    Agent Transport Protocol (ATP). ATP handles asynchronous store-and-forward agent
    delivery; ATTP handles real-time request-response API communication. Both share
    the same identity model, trust framework, and cryptographic primitives.</p>"
