abstract:
- content: "<p>When an end entity includes attestation statements in a Certificate
    Signing Request (CSR), this document is specifically concerned with establishing
    the freshness of Evidence statements among that attestation data. Current attestation
    technology commonly achieves this using nonces. This document outlines the process
    through which nonces are supplied to the end entity by an RA/CA for inclusion
    in Evidence, leveraging the Certificate Management Protocol (CMP), Enrollment
    over Secure Transport (EST), and Certificate Management over CMS (CMC).</p>"
