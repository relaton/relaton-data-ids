abstract:
- content: <p>RFC 6063, "Locally Served DNS Zones", defines two IANA registries called
    "IPv4 Locally-Served DNS Zone" and "IPv6 Locally-Served DNS Zone" registries.
    This document changes the registration policy for that registry from "IETF Review"
    to "Expert Review". Also, this document updates IP Special-Purpose Address Space
    registries to indicate whether an IP address block is eligible to be in Locally-Served
    DNS Zones. Eligible entries will be automatically added to the Locally-Served
    DNS Zones. This document updates RFC 6063 and RFC 6890.</p>
