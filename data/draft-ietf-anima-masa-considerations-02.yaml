abstract:
- content: "<p>This document describes a number of operational modes that a BRSKI
    Manufacturer Authorized Signing Authority (MASA) may take on. Each mode is defined,
    and then each mode is given a relevance within an over applicability of what kind
    of organization the MASA is deployed into. This document does not change any protocol
    mechanisms.</p>"
