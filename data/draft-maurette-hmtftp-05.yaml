abstract:
- content: "<p>HMTFTP is a lightweight UDP file transfer protocol derived from TFTP
    that adds TLV-based negotiation and an optional AEAD protection mode for DATA
    payloads. This document requests IANA actions: assignment of a service name and
    UDP port, and creation of registries for TLV Types, OpCodes, and Ciphersuites.</p>"
