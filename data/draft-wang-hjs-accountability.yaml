abstract:
- content: "<p>This document defines the Human Judgment Structure (HJS) v2.0, a modular
    accountability layer for AI agents built on the Judgment Event Protocol (JEP).
    HJS v2.0 separates core accountability semantics from optional governance features,
    enabling a narrow-waist infrastructure that can be deployed incrementally while
    supporting full regulatory compliance when needed. This specification provides
    a complete replacement for HJS v1.0 that preserves all original functionality
    while introducing modular architecture.</p>"
