abstract:
- content: "<p>This document proposes a model for authentication and authorization
    of AI agent interactions. It leverages existing standards such as the Workload
    Identity in Multi-System Environments (WIMSE) architecture and OAuth 2.0 family
    of specifications. Rather than defining new protocols, this document describes
    how existing and widely deployed standards can be applied or extended to establish
    agent authentication and authorization. By doing so, it aims to provide a framework
    within which to use existing standards, identify gaps and guide future standardization
    efforts for agent authentication and authorization.</p>"
