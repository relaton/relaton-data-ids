id: draft-ietf-pce-multipath
title:
- content: Path Computation Element Communication Protocol (PCEP) Extensions for Signaling
    Multipath Information
  language:
  - en
  script:
  - Latn
  format: text/plain
docid:
- id: draft-ietf-pce-multipath
  type: Internet-Draft
  primary: true
abstract:
- content: "<p>A Segment Routing (SR) Policy Candidate Path can contain multiple Segment
    Lists, allowing for load-balancing and protection across diverse paths. However,
    current PCEP extensions for SR Policy only allow signaling of a single Segment
    List per Candidate Path. This document defines PCEP extensions to encode multiple
    Segment Lists within an SR Policy Candidate Path, enabling multipath capabilities
    such as weighted or equal-cost load-balancing across Segment Lists. The extensions
    are designed to be generic and reusable for future path types beyond SR Policy,
    and are applicable to both stateless and stateful PCEP.</p>"
  language:
  - en
  script:
  - Latn
  format: text/html
