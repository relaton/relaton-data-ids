abstract:
- content: "<p>While ANIMA Intent enables goal-oriented control within an Autonomic
    Domain, emerging services (e.g., AI inference) require a common, interoperable
    representation for expressing service-level objectives and constraints that span
    network, compute, and storage resources, rather than connection-centric descriptions.
    This document defines Service Intent for Autonomic Networks by specifying a structured
    semantic model and a concise format with identification, scope, versioning, and
    lifecycle semantics.</p>"
