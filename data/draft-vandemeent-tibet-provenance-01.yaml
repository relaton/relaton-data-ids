abstract:
- content: "<p>This document defines TIBET (Transaction/Interaction-Based Evidence
    Trail), a data model and protocol for constructing cryptographically linked provenance
    chains over interactions between autonomous agents, human actors, and automated
    processes. A TIBET token captures four dimensions of provenance: content (ERIN),
    references (ERAAN), context (EROMHEEN), and intent (ERACHTER). Tokens are cryptographically
    signed, hash-chained, and designed for append-only storage. TIBET is transport-agnostic
    and encoding-flexible, with JSON over HTTPS as the baseline serialization. This
    document specifies the token data model, chain semantics, canonicalization rules,
    verification procedures, and integration points with companion protocols JIS [JIS],
    UPIP [UPIP], RVP [RVP], and AINS [AINS].</p>"
