abstract:
- content: "<p>The modern web lacks a reliable mechanism for verifying the identity
    of HTTP user agents. Existing methods such as User-Agent strings and IP-based
    attribution are insufficient due to spoofing, shared infrastructure (NAT), and
    the rise of automated agents. This document specifies SAIP (Signed Agent Identity
    Protocol), a lightweight, opt-in mechanism for verifiable client identity at the
    application layer. SAIP enables servers to distinguish between legitimate automated
    traffic and malicious actors.</p>"
