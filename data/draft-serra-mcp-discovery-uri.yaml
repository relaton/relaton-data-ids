abstract:
- content: '<p>The Model Context Protocol (MCP) defines a standard interface for AI
    agents to connect to external tools and services. However, no standard mechanism
    exists for an AI agent to autonomously discover which web domains expose an MCP
    server. This document defines: (1) the "mcp" URI scheme, a machine-to- machine
    identifier for publicly reachable MCP servers; (2) a discovery convention based
    on the well-known URI "/.well-known/mcp-server" as defined in RFC 8615; (3) a
    fallback discovery mechanism using DNS TXT records. This specification does not
    define the MCP protocol itself, nor authentication between agent and server. Those
    are covered by the MCP specification and OAuth 2.1 respectively.</p>'
