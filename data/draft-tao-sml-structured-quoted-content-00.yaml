abstract:
- content: <p>This document describes a machine-readable format for conveying quoted
    content in email messages. This can be used when replying to or forwarding an
    email message. Structured quoted content is expected to be used in conjunction
    with conventional, human-readable quote formatting. They are based on the forthcoming
    "structured email" specification defined in [I-D.ietf- sml-structured-email-03]
    and related drafts.</p>
