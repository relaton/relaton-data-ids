abstract:
- content: "<p>This document specifies the applicability of Bidirectional Forwarding
    Detection in multipoint networks to support sub-second failure detection for Virtual
    Router Redundancy Protocol Router Role election. The mechanism enables faster
    determination of the Active Router without requiring any modification to the protocol
    behavior or message formats defined in RFC 9568.</p>"
