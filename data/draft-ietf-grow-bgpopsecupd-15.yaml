abstract:
- content: "<p>The Border Gateway Protocol (BGP) is a critical component in the Internet
    to exchange routing information between network domains. It is important to understand
    the security and reliability requirements that can and should be met to prevent
    accidental or intentional routing disturbances. Previously, security considerations
    for BGP have been described in RFC7454 / BCP194. Since the publication of RFC7454,
    changes in operational practice have taken place, which are partially conflicting
    with the advice given in RFC7454. This document obsoletes RFC7454, and provides
    less implementation-specific best practices, with the goal of being less prone
    to becoming outdated or conflicting with changed operational practices.</p>"
