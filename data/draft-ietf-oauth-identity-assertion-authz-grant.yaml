abstract:
- content: "<p>This specification provides a mechanism for an application to use an
    identity assertion to obtain an access token for a third-party API by coordinating
    through an identity provider that the downstream Resource Authorization Server
    already trusts for single sign-on (SSO), using Token Exchange [RFC8693] and JWT
    Profile for OAuth 2.0 Authorization Grants [RFC7523].</p>"
  language:
  - en
  script:
  - Latn
  format: text/html
