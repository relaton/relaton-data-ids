abstract:
- content: "<p>This document defines a domain profile of the Operating Model Protocol
    (OMP) for AI systems deployed in Singapore and the ASEAN region subject to the
    Singapore Model AI Governance Framework (Second Edition, 2020), the Monetary Authority
    of Singapore (MAS) FEAT Principles for financial services AI, and the ASEAN Guide
    on AI Governance and Ethics (2024). The profile -- designated SingapureMark --
    specifies how OMP's deterministic routing invariant, Watchtower enforcement framework,
    and three-layer cryptographic integrity architecture generate the per-decision
    accountability evidence required by Singapore's model AI governance framework,
    satisfy the MAS FEAT Principles' named accountability and explainability requirements,
    and align with the ASEAN Guide's human oversight and consumer protection governance
    standards. The OMP core specification is defined in the Operating Model Protocol
    Internet-Draft (draft-veridom-omp).</p>"
