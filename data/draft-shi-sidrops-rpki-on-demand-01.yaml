abstract:
- content: "<p>Currently, Relying Parties (RPs) retrieve the complete set of RPKI
    objects from repositories. This all-or-nothing model increases network traffic,
    synchronization latency, and computational overhead. This document examines these
    limitations and outlines directions for enabling more selective and efficient
    RPKI data access.</p>"
