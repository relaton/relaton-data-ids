abstract:
- content: "<p>This document describes the Cognitive Time Protocol (CTP) family, a
    conceptual framework for representing and manipulating time in AI systems. The
    CTP family is organized into four layers: perception, direction, copy, and emergence.
    This document describes the terminology, the layer structure, and the relationships
    between layers. It does not specify wire protocols or message formats; it provides
    a conceptual foundation for future protocol designs and implementations.</p>"
