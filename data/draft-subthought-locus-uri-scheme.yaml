abstract:
- content: '<p>This document defines the "locus" URI scheme, a hierarchical interplanetary
    addressing system that encodes both astronomical location and network routing
    information within a fixed 256-bit structure. The scheme enables deterministic
    resolution of named endpoints into IPv6-compatible network addresses and supports
    future interplanetary networking without reliance on centralized lookup systems.
    The Locus scheme introduces a unified address format spanning five tiers: star
    system, orbital position, planetary body, network domain, and host identifier.
    The upper 128 bits encode astronomical location; the lower 128 bits encode IPv6-compatible
    network identity. For present Earth-based deployments, the scheme resolves to
    standard HTTPS URLs via DNS. Future extensions accommodate delay-tolerant networking
    across Lunar, Martian, and interstellar distances.</p>'
