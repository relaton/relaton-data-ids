abstract:
- content: "<p>MASQUE (Multiplexed Application Substrate over QUIC Encryption) is
    a set of protocols and extensions to HTTP that allow proxying all kinds of Internet
    traffic over HTTP. This document describes the architectural principles behind
    MASQUE, and the properties that MASQUE can provide.</p>"
