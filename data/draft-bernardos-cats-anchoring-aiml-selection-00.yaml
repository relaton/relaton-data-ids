abstract:
- content: "<p>The IETF CATS WG addresses the problem of how the network infrastructure
    can steer traffic between clients of a service and sites offering the service,
    considering both network metrics (such as bandwidth and latency), and compute
    metrics (such as processing, storage capabilities, and capacity). This document
    describes solutions to enable the network to select the best site to instantiate
    a processing service (using distributed sensing as an application example), augmenting
    CATS enabled solutions that consider both connectivity and computing, to also
    consider AI/ML and data capabilities and governance policies.</p>"
