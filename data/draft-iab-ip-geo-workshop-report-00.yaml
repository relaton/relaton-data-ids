abstract:
- content: "<p>The IAB Workshop on IP Address Geolocation (IP-GEO) was held from December
    3-5, 2025, as a three-day virtual meeting. It covered the use cases and background
    on using IP addresses as indicators of geolocation, explored various problems
    and challenges that exist in that ecosystem, and discussed future directions and
    opportunities to improve or replace the current practices.</p>"
