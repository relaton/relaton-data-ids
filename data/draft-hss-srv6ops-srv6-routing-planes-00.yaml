abstract:
- content: "<p>This document introduces a BGP-based multi-planar routing architecture
    for modern data center networks, with a particular focus on environments running
    AI/ML workloads that demand traffic segregation. The proposed solution enables
    deterministic routing for workloads with characteristics such as collective communication
    and multi-tenancy. It allows the creation of multiple logical routing planes over
    a shared physical infrastructure by defining planes through three key elements:
    Constraints (e.g., fabric color inclusion/exclusion) Calculation types (e.g.,
    shortest path) and Metric types (e.g., cost, delay, bandwidth).</p>"
