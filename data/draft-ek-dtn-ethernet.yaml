abstract:
- content: "<p>This memo requests allocation of an EtherType and multicast MAC address
    for Bundle Transfer Protocol - Unidirectional (BTP-U) to enable its use as a Convergence
    Layer on Ethernet networks. This provides an alternative to IP-based convergence
    layers for environments where Ethernet forwarding is operationally feasible but
    IP routing is unavailable or operationally undesirable.</p>"
