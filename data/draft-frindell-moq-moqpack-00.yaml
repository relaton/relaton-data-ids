abstract:
- content: "<p>This document defines an extension to Media over QUIC Transport (MOQT)
    that enables QPACK compression for control messages. By leveraging QPACK's dynamic
    table, this extension significantly reduces the overhead of repeated values such
    as track names and authorization tokens, improving efficiency for sessions with
    many subscriptions or frequent redundant values.</p>"
