abstract:
- content: "<p>Computation-aware Traffic Steering (CATS) offers a framework for selecting
    computation service sites based on computation capabilities and load, and considering
    the network capabilities and state on the paths to the sites. Optical Transport
    Networks (OTN) provide guaranteed separation of traffic along with reserved hardware
    resources offering bandwidth and quality of service promises. This document describes
    how OTN may be used to support a CATS system to achieve the stringent performance
    targets required by demanding service environments.</p>"
