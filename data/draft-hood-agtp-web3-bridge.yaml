abstract:
- content: "<p>The Agent Transfer Protocol (AGTP) uses a PKI-based trust model: agent
    identity is anchored to DNS-verified domain ownership and CA- issued X.509 certificates.
    Web3 systems offer an alternative identity model based on blockchain address ownership,
    smart contract verification, and decentralized naming systems including the Ethereum
    Name Service (ENS) and Unstoppable Domains. This document specifies the AGTP Web3
    Bridge: a framework for mapping Web3 identity anchors to AGTP trust tiers, resolving
    Web3 names to canonical AGTP Agent- IDs, and operating AGTP sessions with agents
    whose identity is anchored to blockchain rather than DNS. Web3-anchored agents
    are treated as Trust Tier 2 (Org-Asserted) in the absence of additional verification.
    This document also defines the conditions under which a Web3 identity MAY be elevated
    to Trust Tier 1 through a hybrid verification procedure.</p>"
