abstract:
- content: "<p>This document defines a mechanism for discovering MPLS Network Actions
    (MNA) capabilities along a Label Switched Path (LSP) using the LSP Ping echo request/reply
    mechanism defined in RFC 8029. The In-Stack MNA capabilities include the Readable
    Label Depth (RLD), the maximum sizes of differently scoped Network Action Sub-stacks
    (MLD_NAS), and supported In-Stack network action opcodes. The Post- Stack MNA
    capabilities include the maximum Post-Stack MPLS Header size (MLD_PSMH), the Readable
    Label Depth including the Post-Stack MPLS Header (RLD_PSMH), and supported Post-Stack
    network action opcodes. This mechanism allows the ingress Label Edge Router (LER)
    to discover MNA capabilities of each transit and egress node on the path, enabling
    correct construction of MPLS label stacks containing MNA network actions.</p>"
