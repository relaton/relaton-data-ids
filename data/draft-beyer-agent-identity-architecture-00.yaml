abstract:
- content: "<p>Software agents increasingly act on behalf of people across communication,
    automation, and decision-making contexts. These agents initiate actions, delegate
    tasks, and interact with other agents without a consistent model for representing
    the human who authorized them, the scope of authority they possess, or the provenance
    of their actions across ecosystems. This document defines an architectural model
    for human-anchored agent identity. The model introduces a human identity root,
    explicit delegation semantics, and a provenance structure that enables ecosystems
    to determine whether an agent is legitimate, whether it is acting within its intended
    authority, and how its actions relate to a responsible human. This document does
    not define a protocol or wire format. It provides an architectural foundation
    that existing systems may bind to in order to support accountable, interoperable,
    and human-aligned agent ecosystems.</p>"
