abstract:
- content: "<p>This document defines the Judgment Event Protocol (JEP) — a minimal,
    verifiable log format for decision-related operations in agent systems. The protocol
    specifies four immutable event verbs (J, D, T, V), a signed JSON event structure
    with anti-replay protection, and standardized signature verification rules. This
    protocol enables interoperability across platforms and autonomous agents. Optional
    standard extensions are provided for privacy protection, accountability distribution,
    data lifecycle management, and data sovereignty adaptation.</p>"
