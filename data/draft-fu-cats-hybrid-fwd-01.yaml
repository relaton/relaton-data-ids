abstract:
- content: "<p>This document specifies a hybrid forwarding mechanism for Computing-
    Aware Traffic Steering (CATS). The mechanism integrates the CATS forwarding table
    with the IP forwarding table to optimize forwarding table capacity utilization.
    By customizing the forwarding model based on service identifiers, it accommodates
    both experience- sensitive and non-experience-sensitive services. Additionally,
    it supports flow-granularity load balancing, enhancing the utilization of computing
    and networking resources while ensuring differentiated service requirements are
    satisfied.</p>"
