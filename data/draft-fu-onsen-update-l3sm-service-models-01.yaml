abstract:
- content: "<p>RFC8299 defines a YANG data model for L3VPN service delivery. This
    document defines a set of extensions that address the limitations of the L3VPN
    Service Model (L3SM) as initially defined in RFC 8299, which assumes static connectivity
    and fixed bandwidth allocations. Based on field deployment feedback, the extensions
    enable dynamic L3VPN capabilities including dynamic network provisioning and bandwidth
    adjustment. This document further supplements technical deficiencies by providing
    (1) integration of Slice Service Templates for SRv6 VPN scenarios, (2) performance
    monitoring to enrich operational state data and service quality visibility, (3)quantum-
    safe encryption.</p>"
