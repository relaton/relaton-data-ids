abstract:
- content: "<p>This document describes a system for site operators to monitor for
    mis-issued Merkle Tree Certificates affecting their websites. This monitoring
    is highly efficient, requiring site operators to do an amount of work that is
    only logarithmic proportional to the total number of certificates issued. It does
    this while preserving the security and transparency guarantees of Merkle Tree
    Certificates. Discussion Venues This note is to be removed before publishing as
    an RFC. Source for this draft and an issue tracker can be found at https://github.com/Bren2010/draft-server-monitoring.</p>"
