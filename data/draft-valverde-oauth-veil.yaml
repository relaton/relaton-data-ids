abstract:
- content: "<p>VEIL (Verified Ephemeral Identity Layer) is a security profile of OAuth
    2.1 for privacy-preserving identity verification. It separates claims into two
    tracks: proof claims (boolean verification results, compliance flags, assurance
    levels) travel through standard token claims, while identity claims (name, date
    of birth, address, nationality) travel only through an ephemeral, single-consume
    channel that keeps personally identifiable information off long-lived tokens.
    Subject identifiers are pairwise by default. Consent records are HMAC-protected.
    Step-up authentication scales with operation sensitivity. VEIL is the base profile
    for domain-specific extensions.</p>"
