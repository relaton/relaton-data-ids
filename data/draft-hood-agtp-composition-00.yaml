abstract:
- content: "<p>Agent Group Messaging Protocols (AGMPs) -- including the Model Context
    Protocol (MCP), the Agent-to-Agent Protocol (A2A), and the Agent Communication
    Protocol (ACP) -- define what AI agents say to each other. The Agent Transfer
    Protocol (AGTP) defines how those messages move across a network. This document
    specifies how AGMP messages are carried over AGTP as a transport substrate, providing
    normative mapping rules for identity, authority scope, delegation, and session
    fields between the AGMP and AGTP layers. AGTP headers take precedence over equivalent
    AGMP payload fields for all infrastructure-level routing, enforcement, and audit
    operations. Agents gain transport-level governance, observability, and identity
    without modification to the AGMP layer.</p>"
