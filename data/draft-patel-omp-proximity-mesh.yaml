abstract:
- content: "<p>This document describes the Open Mesh Protocol (OMP), a proposed open
    standard for device-native proximity mesh networking spanning multiple radio technologies
    simultaneously. Existing proximity wireless mesh standards -- including Wi-Fi
    Aware (NAN), Bluetooth Mesh, and Thread -- each operate over a single radio technology
    and serve specific application domains. No existing open standard provides a unified
    multi-radio mesh routing protocol spanning BLE, WiFi Direct, and LoRa with per-device
    cryptographic identity independent of any central registry or carrier relationship.
    This document describes the OMP architecture, specific technical implementations,
    and the gap in the current standards landscape that OMP addresses. It is submitted
    as an Informational Internet-Draft to establish a public prior art record and
    to invite community discussion on whether a new working group or individual submission
    track is appropriate for this work.</p>"
