abstract:
- content: '<p>This document defines the Agent Dispute Resolution Protocol (ADRP),
    a wire protocol and state machine for resolving disputes that arise from cryptographically-attested
    agent-to-agent (A2A) transactions. ADRP is the companion specification to ATXN
    (draft-stone-atxn-00), which defines what an A2A transaction is. ADRP defines
    what happens when a party contests one. ADRP severs an equivalence that every
    prior agentic commerce design has implicitly assumed: that a valid cryptographic
    proof bundle equals contractual satisfaction. It does not. Conduit-style cryptographic
    verifiers prove that an agent took specified actions; they do not prove that those
    actions satisfied the principal''s Intent Mandate. ADRP bifurcates disputes into
    a cryptographic class (resolvable by code from the proof bundle and mandate chain)
    and a semantic class (resolvable only against pre-committed machine- readable
    acceptance criteria, with arbitration escalation when those criteria are absent
    or under-specified). ADRP introduces the Arbitration Mandate as a fourth element
    of the AP2 mandate chain (Intent / Cart / Payment / Arbitration), pre-signed by
    the principal at agent-deployment time. The Arbitration Mandate is the FAA Section
    2-compliant written agreement that anchors the entire protocol legally without
    statutory change. ADRP defines a counter-attestation override pattern in which
    a signed RulingBundle supersedes a Conduit ProofBundle by a signing-time precedence
    rule rather than by mutation. Both the original attestation and the override are
    preserved forever in the hash chain; "override" is a verification-time computation,
    not a write. Companion specifications (all co-submitted as Internet-Drafts, work
    in progress): * ATXN (draft-stone-atxn-00): defines the A2A transaction primitive
    that ADRP resolves disputes over * AIVS (draft-stone-aivs-01): cryptographic audit-trail
    substrate for proof bundles * VCAP (draft-stone-vcap-01): verified-commerce escrow
    rails consumed by ADRP EscrowDirectives * ATEP (draft-stone-atep-01): trust passports
    referenced by Standing Tokens in ADRP</p>'
