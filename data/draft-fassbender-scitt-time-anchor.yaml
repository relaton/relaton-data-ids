abstract:
- content: "<p>SCITT Transparency Services record signed statements in append-only
    logs and issue receipts that include an internal timestamp derived from log inclusion.
    This timestamp depends on the service operator's own clock and log infrastructure.
    It cannot be independently verified by a party that does not trust the operator.
    This document defines an optional, additive profile that attaches an externally
    verifiable time anchor to an existing Origin Record. The anchor is a standard
    OpenTimestamps (.ots) proof ultimately committed to the Bitcoin blockchain. The
    resulting proof is self-contained and portable: it can be verified by any party
    holding the original file and the.ots proof, without contacting the Transparency
    Service, the anchoring service, or any trusted authority. No changes to SCITT
    protocols, signed statement formats, or receipt structures are required.</p>"
