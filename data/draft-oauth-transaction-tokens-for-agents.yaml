abstract:
- content: "<p>This document specifies an extension to the OAUTH-TXN-TOKENS (https://drafts.oauth.net/oauth-transaction-tokens/draft-ietf-oauth-
    transaction-tokens.html) to support agent context propagation within Transaction
    Tokens for agent-based workloads. The extension defines the use of the act field
    to identify the agent performing the action, and leverages the existing sub field
    (as defined in the base Transaction Tokens specification) to represent the principal.
    The sub field is populated according to the rules specified in OAUTH-TXN- TOKENS
    (https://drafts.oauth.net/oauth-transaction-tokens/draft-ietf- oauth-transaction-tokens.html),
    based on the 'subject_token' provided in the token request. For autonomous agents
    operating independently, the sub field represents the agent itself. These mechanisms
    enable services within the call graph to make more granular access control decisions,
    thereby enhancing security.</p>"
  language:
  - en
  script:
  - Latn
  format: text/html
