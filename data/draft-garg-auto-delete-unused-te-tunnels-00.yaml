abstract:
- content: "<p>This document describes a timer-based mechanism for handling unused
    Traffic Engineering (TE) tunnels. When a tunnel remains inactive for a configured
    period, it is moved to a parked state, administratively shut down, and the associated
    resources are released. If the tunnel remains parked beyond a longer retention
    interval, it may be deleted automatically or removed through operator action,
    depending on local policy. This approach improves resource utilization and provides
    a structured lifecycle for unused TE tunnels.</p>"
