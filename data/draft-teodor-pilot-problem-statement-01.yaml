abstract:
- content: "<p>AI agents --- autonomous software entities capable of reasoning, planning,
    and executing tasks --- are an increasingly important class of network participant.
    Current agent communication protocols operate exclusively at the application layer
    over HTTP, assuming the existence of stable endpoints, DNS names, and centralized
    infrastructure. No existing standard provides network-layer identity, addressing,
    or transport for agents. This document describes the problem space and identifies
    requirements for a network-layer infrastructure that would give agents first-class
    network citizenship, independent of the web infrastructure designed for human
    users.</p>"
