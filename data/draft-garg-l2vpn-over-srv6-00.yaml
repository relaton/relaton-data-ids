abstract:
- content: "<p>This document describes a mechanism to provide L2VPN services using
    Segment Routing over IPv6 (SRv6), eliminating the need for a separate signaling
    protocol for VPN label distribution. In current deployments, L2VPN services rely
    on dedicated protocols such as Label Distribution Protocol (LDP) or Border Gateway
    Protocol (BGP) for service label signaling, which adds control-plane complexity.
    The proposed mechanism introduces an SRv6-based extension that enables L2VPN service
    identification within the SRv6 framework. This approach reduces control-plane
    overhead and provides a simplified and efficient solution for L2VPN service delivery.</p>"
