abstract:
- content: "<p>This document proposes a layered approach to standardization of AI
    discovery in AI ecosystems within the IETF. It recommends separating the standardization
    of general discovery vehicles from the AI objects to be discovered. AI objects
    include agents, models, data, tasks, among others. While the topic of discovery
    in the realm of AI has focused on discovering agents, the concept can be extended
    by the layered architecture proposed here, allowing for a clarified design scope,
    reduced charter ambiguity, and alignment with IETF layering principles.</p>"
