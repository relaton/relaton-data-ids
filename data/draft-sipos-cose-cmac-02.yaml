abstract:
- content: "<p>The CBOR Object Signing and Encryption (COSE) specification defines
    structures for generating, conveying, and verifying Message Authentication Code
    (MAC) tags. This document registers code points for using the Advanced Encryption
    Standard (AES) block cipher in Cipher-based Message Authentication Code (CMAC)
    mode within those COSE structures. Specifically, these uses are for computing
    MAC tag values with no additional parameters.</p>"
