abstract:
- content: "<p>The Border Gateway Protocol, Version 4 (BGP-4) (RFC 4271) uses TCP
    (RFC 9293) as its transport layer protocol. There are proposals to run BGP over
    TLS-based transport protocols, including QUIC. This document discusses authentication
    considerations for running BGP over TLS protocols and defines a PKI framework
    to provide for authenticating BGP peering sessions.</p>"
