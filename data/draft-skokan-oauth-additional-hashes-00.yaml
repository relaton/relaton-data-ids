abstract:
- content: "<p>This document defines SHA-384 as an additional hash algorithm option
    for OAuth 2.0 Proof Key for Code Exchange (PKCE), Demonstrating Proof of Possession
    (DPoP), and mutual-TLS certificate-bound access tokens. These mechanisms currently
    mandate the use of SHA-256.</p>"
