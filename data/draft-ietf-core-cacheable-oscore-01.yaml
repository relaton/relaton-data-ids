abstract:
- content: "<p>When using the Constrained Application Protocol (CoAP), exchanged messages
    can be protected end-to-end also across untrusted intermediary proxies. This can
    be achieved with Object Security for Constrained RESTful Environments (OSCORE)
    or, in the case of group communication, with Group Object Security for Constrained
    RESTful Environments (Group OSCORE). However, this sidesteps the proxies' abilities
    to cache responses from the origin server(s). This document restores cacheability
    of end-end protected responses at proxies, by using Group OSCORE and introducing
    consensus requests, which any client in an OSCORE group can send to one server
    or multiple servers in the same group.</p>"
