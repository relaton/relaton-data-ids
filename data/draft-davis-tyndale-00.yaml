abstract:
- content: "<p>Notation Conventions ASCII notation is normative. Unicode notation
    is informative. Both encodings produce identical semantic output. The choice of
    representation does not alter meaning -- it demonstrates the protocol's encoding
    independence. This is not a modern innovation. The protocol formalizes patterns
    that have emerged independently across human communication systems for 60,000
    years: Aboriginal songlines, medical notation (Rx), ham radio Q-codes (QTH), maritime
    signals (SOS), and internet shorthand (1337, TL;DR). This document specifies Tyndale,
    an application-layer semantic addressing protocol. Where traditional compression
    transmits reduced content (M -&gt; C -&gt; M), Tyndale transmits coordinates that
    the receiver expands locally (M -&gt; A, Σ(A) -&gt; M'). The receiver's substrate
    already contains the meaning; transmission provides location, not payload. The
    selection formula tau = (M / S) x R x G optimizes for meaning preserved per signal
    spent (M/S), resilience across expression systems (R), and cognitive alignment
    with receiver processing (G). Bandwidth-constrained environments -- disaster response
    networks, degraded infrastructure, deep space communications -- require semantic
    transmission under conditions where traditional compression fails. When every
    bit costs power, time, or lives, communication systems need a different primitive.
    Taft's teletype (1909). Voyager 1 (160 bps @ 15 billion miles). iPhone. Same protocol.
    Tyndale is to natural language what DNS is to IP addresses. The mathematics describes
    how meaning moves.</p>"
