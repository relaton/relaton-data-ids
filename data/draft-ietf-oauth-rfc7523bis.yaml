---
schema-version: v1.2.9
id: draft-ietf-oauth-rfc7523bis
title:
- content: Updates to OAuth 2.0 JSON Web Token (JWT) Client Authentication and Assertion-Based
    Authorization Grants
  language:
  - en
  script:
  - Latn
  format: text/plain
docid:
- id: draft-ietf-oauth-rfc7523bis
  type: Internet-Draft
  primary: true
abstract:
- content: "<p>This document updates RFC7521, RFC7522, RFC7523 and RFC9126 with respect
    to the treatment of audience values in OAuth 2.0 Client Assertion Authentication
    and Assertion-based Authorization Grants to address a security vulnerability identified
    in the previous requirements for those audience values in multiple OAuth 2.0 specifications.</p>"
  language:
  - en
  script:
  - Latn
  format: text/html
