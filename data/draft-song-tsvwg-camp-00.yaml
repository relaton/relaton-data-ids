abstract:
- content: "<p>With the prosperity of generative large language models (LLMs), interactive
    LLM-based services, such as digital humans, have imposed new stringent requirements
    on low latency and high multimodal consistency. Traditional interactive LLM-based
    systems typically transmit multimodal content over a single network path, thereby
    failing to exploit the advantages offered by multipath networks. Even when multipath
    transport mechanisms are adopted, single-stream encapsulation does not enable
    differentiated management of heterogeneous modalities. However, naively separating
    modalities into multiple streams further introduces inter-modal arrival inconsistency.
    To address these challenges, this document specifies CAMP, a consistency-aware
    multipath transport design over the Multipath QUIC (MPQUIC) protocol. First, CAMP
    defines a three-stream separation encapsulation format to support modality-differentiated
    transmission. Second, it incorporates a transport-layer consistency- aware multipath
    scheduler to reduce inter-modal arrival time deviation across network paths. Third,
    it specifies a client-side application-layer alignment mechanism that operates
    in coordination with the transport scheduler. To the best of our knowledge, this
    is the first specification to address multipath-enabled multimodal consistency
    guarantees for interactive LLM-based systems.</p>"
