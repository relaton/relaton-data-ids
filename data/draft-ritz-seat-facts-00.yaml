abstract:
- content: <p>This document describes FACTS (Factor-based Attestation and Credential
    Transport Scheme) over TLS 1.3. Conceptually acting as "multi-factor authentication"
    for machine identities, factor-based attestation derives session trust from multiple
    independent cryptographic inputs rather than a single point of failure. Specifically,
    it utilizes a dual-key scheme that binds identity to attestation evidence through
    the use of key encapsulation material keys (KEM) and traditional identity signing
    keys (IK), establishing per-session freshness.</p>
