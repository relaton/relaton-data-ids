abstract:
- content: "<p>This document specifies a minimal convergence layer protocol for transferring
    Bundle Protocol version 7 (BPv7) bundles over QUIC. The protocol leverages QUIC's
    native capabilities for reliable streaming, connection management, and security,
    requiring no application-layer framing for reliable transfers. Unreliable transfers
    use the Bundle Transfer Protocol - Unidirectional (BTP-U) over QUIC datagrams.</p>"
