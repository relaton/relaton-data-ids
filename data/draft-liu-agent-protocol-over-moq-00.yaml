abstract:
- content: "<p>This document specifies a Agent-to-Agent communication framework enabling
    structured, low-latency, and semantically rich communication between autonomous
    agents over the Media over QUIC (MoQ) protocol. It leverages MoQ's efficient media
    transport capabilities while introducing a new application-layer framing mechanism
    to support control signaling, session management, and large data fragmentation.
    The design supports both intra-domain and inter-domain deployment, with an emphasis
    on interoperability, extensibility, and minimal overhead.</p>"
