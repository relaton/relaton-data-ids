abstract:
- content: "<p>This document defines Delta-1, a profile of the SCITT (Supply Chain
    Integrity, Transparency, and Trust) architecture applied to AI agent decision
    accountability. Delta-1 specializes the SCITT receipt model for a specific use
    case: proving that an individual AI decision met three accountability conditions
    simultaneously: C1: Evidence of the decision process was consumed and sealed.
    C2: Strategic intent was isolated from inference providers. C3: An authorized
    party recorded the settlement. The verdict is binary (VALID or INVALID) with no
    intermediate states. Receipts are independently verifiable without the issuing
    infrastructure being online, subject to the trust and attestation assumptions
    defined in this document. By building on the SCITT framework, Delta-1 inherits
    transparency-log semantics, receipt conventions, and verification patterns, while
    extending them with domain-specific requirements for AI decision closure. This
    profile is intended for regulated industries, including finance, healthcare, and
    legal, operating under accountability and record- retention obligations.</p>"
