abstract:
- content: "<p>This document describes a fine-grained Quality of Experience (QoE)
    enhancement mechanism using semantic tables deployed at network forwarding nodes.
    The mechanism enables application-level SLA (Service Level Agreement) guarantees
    by carrying address indices and high-frequency-changing information in packets
    while maintaining low- frequency-changing semantic information at network nodes.
    This approach overcomes the limitations of traditional Application-aware Networking
    (APN) solutions, including excessive packet header overhead. The mechanism supports
    collaborative optimization across network, computing, and energy dimensions, and
    can be deployed over MPLS, IPv4/v6, SRv6, and other protocol data planes.</p>"
