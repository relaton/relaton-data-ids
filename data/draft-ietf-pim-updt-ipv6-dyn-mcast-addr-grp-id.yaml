schema-version: v1.2.9
id: draft-ietf-pim-updt-ipv6-dyn-mcast-addr-grp-id
title:
- content: Updates to Dynamic IPv6 Multicast Address Group IDs
  language:
  - en
  script:
  - Latn
  format: text/plain
docid:
- id: draft-ietf-pim-updt-ipv6-dyn-mcast-addr-grp-id
  type: Internet-Draft
  primary: true
abstract:
- content: "<p>This document describes limitations of the existing range of dynamic
    IPv6 multicast addresses specified in RFC3307, Allocation Guidelines for IPv6
    Multicast Addresses. It updates RFC3307 by replacing these allocations with a
    new IANA registry in the IPv6 Multicast Address Space registry group. The document
    also defines initial contents of the new registry: a reduced allocation for the
    Multicast Address Dynamic Client Allocation Protocol (MADCAP; RFC2730), a range
    for SSM, a Private Use range, a range for Experimental Use, and Solicited-Node
    multicast addresses (which were not previously noted in RFC3307).</p>"
  language:
  - en
  script:
  - Latn
  format: text/html
