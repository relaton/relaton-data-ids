abstract:
- content: "<p>This document specifies the Reilly Model Routing Protocol (RMRP), a
    framework for policy-governed, auditable routing of inference requests across
    heterogeneous artificial intelligence (AI) model environments. RMRP defines the
    structural metadata, routing policy declaration, execution semantics, audit trail
    requirements, and cost attribution mechanisms necessary to govern how inference
    requests are directed to AI models in multi-model deployments. The protocol is
    AI-provider agnostic and operates independently of any specific model architecture,
    inference runtime, vendor implementation, or transport layer. RMRP addresses the
    absence of a standardized protocol-layer specification governing how routing decisions
    are declared, transmitted, logged, and enforced across AI model deployments at
    organizational scale.</p>"
