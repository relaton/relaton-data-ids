abstract:
- content: "<p>YANG (RFC 7950) is a standardized data modeling language. The data
    may be encoded in XML (RFC 7950), JSON (RFC 7951), plain CBOR (RFC 9254) or CBOR
    with standins (draft-bormann-cbor-yang-standin). This document specifies how to
    convert data modeled by YANG encoded in one of the formats into another format.
    Use cases include e.g. local transcoding between Netconf and Restconf for tool
    compatibility, or reverse proxying while composing multiple backends. This document
    also defines a data annotation for additional value type specification. That data
    annotation behavior updates RFC 7950, RFC 7951 and RFC 9254.</p>"
