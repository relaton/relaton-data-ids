abstract:
- content: "<p>This document discusses the applicability of A2A protocol to the network
    management in the multi-domain heterogeneous network environment that utilizes
    IETF technologies. It explores operational aspect, key components, generic workflow
    and deployment scenarios. The impact of integrating A2A into the network management
    system is also discussed.</p>"
