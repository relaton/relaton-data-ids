abstract:
- content: "<p>A Cryptographically Relevant Quantum Computer (CRQC) can break traditional
    public-key algorithms (e.g., RSA, ECDSA), which are typically used for authentication
    in IKEv2. Combining the post- quantum ML-DSA signature algorithm with a traditional
    signature algorithm provides protection against potential weaknesses or implementation
    flaws in ML-DSA. This draft defines a hybrid PKI authentication method for IKEv2
    using composite certificates that ensures authentication remains secure as long
    as at least one of the component signature algorithms remains unbroken.</p>"
