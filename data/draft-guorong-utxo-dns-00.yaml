abstract:
- content: "<p>This document defines the UTXO Domain Name System (UTXO-DNS), a distributed
    domain name system based on the blockchain Unspent Transaction Output (UTXO) model.
    UTXO-DNS provides a decentralized domain name resolution mechanism supporting
    the registration, resolution, and management of both global and region-specific
    domain names. The system adopts a hierarchical naming structure compatible with
    the existing DNS while ensuring domain name ownership proof and tamper-proof characteristics
    through blockchain technology. This protocol extends the traditional DNS protocol
    by introducing a blockchain-based domain name ownership verification mechanism,
    supporting internationalized domain names, digital currency address records, and
    decentralized identity records, among other new features.</p>"
