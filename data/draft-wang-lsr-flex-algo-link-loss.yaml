abstract:
- content: "<p>This document proposes extensions to the IGP Flexible Algorithm. It
    introduces a mechanism to exclude links exceeding a specified packet loss rate
    threshold during path computation. The solution leverages existing link packet
    loss advertisement via IS-IS and OSPF, and defines new constraints for Flex-Algorithm
    path calculation.</p>"
