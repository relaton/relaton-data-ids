abstract:
- content: "<p>This document specifies the Open Internet Time Protocol (OITP), a network
    time synchronization protocol for decimal time systems that divide the civil day
    (86400 SI seconds) into 1000 primary units called beats, each exactly 86.4 SI
    seconds. OITP enables clients to synchronize decimal time clocks over packet-switched
    networks with sub-beat precision, using techniques derived from existing network
    time protocols adapted for the decimal time domain. The reference timescale uses
    UTC+1 as its reference meridian, with midnight at UTC+1 corresponding to beat
    zero.</p>"
